  else if(state.view==='scrum')content.innerHTML=projectGuard(renderScrumView);
  else if(state.view==='hybrid')content.innerHTML=projectGuard(renderHybridView);
  else if(state.view==='budget')content.innerHTML=projectGuard(renderBudgetView);
  else if(state.view==='resources')content.innerHTML=projectGuard(renderResourcesViewV2);
  else if(state.view==='raid')content.innerHTML=projectGuard(renderRaidView);
  else if(state.view==='reports')content.innerHTML=projectGuard(renderReportsView);
  else if(state.view==='ai')content.innerHTML=projectGuard(renderAIView);
  else if(state.view==='masters')content.innerHTML=renderMasters();
  else if(state.view==='help')content.innerHTML=renderHelp();
  else if(state.view==='appendix')content.innerHTML=renderAppendix();
  setTimeout(afterRender,0);
}
function afterRender(){if(state.view==='gantt')drawGantt();if(['summary','reports','budget','scrum','raid','ai'].includes(state.view))drawChartsForView()}
function renderSummary(){
  if(!state.summaryTab)state.summaryTab='overview';
  const projs=db.projects;const metrics=projs.map(projectMetrics);const total=projs.length;const avgHealth=metrics.length?Math.round(metrics.reduce((a,m)=>a+m.health,0)/metrics.length):0;const totalBudget=metrics.reduce((a,m)=>a+m.planned,0);const actual=metrics.reduce((a,m)=>a+m.actual,0);const forecast=metrics.reduce((a,m)=>a+m.forecast,0);const risks=metrics.reduce((a,m)=>a+m.openRisks.length,0);const resIds=new Set(projs.flatMap(p=>p.resourceIds||[]));
  let html=`<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openProjectModal()">+ New Project</button><button class="btn" onclick="exportBackup()">Export JSON Backup</button><button class="btn" onclick="importBackup()">Import Backup</button><button class="btn" onclick="printAllProjectCharts()">Download Summary PDF</button></div></div>${summaryTabs()}`;
  html+=`<div class="grid kpi"><div class="card kpiCard"><div class="kpiLabel">Projects</div><div class="kpiValue">${total}</div><div class="kpiSub">Fixed, Scrum and Hybrid</div></div><div class="card kpiCard"><div class="kpiLabel">Average Health</div><div class="kpiValue">${avgHealth}%</div><div class="kpiSub">Predictive delivery health</div></div><div class="card kpiCard"><div class="kpiLabel">Budget</div><div class="kpiValue" style="font-size:22px">${money(totalBudget)}</div><div class="kpiSub">Actual ${money(actual)}</div></div><div class="card kpiCard"><div class="kpiLabel">Forecast</div><div class="kpiValue" style="font-size:22px">${money(forecast)}</div><div class="kpiSub">Variance ${money(totalBudget-forecast)}</div></div><div class="card kpiCard"><div class="kpiLabel">Open Risks</div><div class="kpiValue">${risks}</div><div class="kpiSub">Across all projects</div></div><div class="card kpiCard"><div class="kpiLabel">Team Pool</div><div class="kpiValue">${resIds.size}</div><div class="kpiSub">Assigned resources</div></div></div>`;
  if(state.summaryTab==='overview'){
    html+=`<div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>All Projects Register Snapshot</h3><span class="eyebrow">Open to manage project-level details</span></div>${summaryTable(projs,metrics)}</div><div class="card"><div class="cardTitle"><h3>Summary Charts</h3><button class="btn sm" onclick="setSummaryTab('charts')">View all charts</button></div><div class="chartGrid"><div id="chartMode" class="chartBox compact"></div><div id="chartHealth" class="chartBox compact"></div></div></div></div>`;
  } else if(state.summaryTab==='charts') {
    html+=`<div class="chartGrid expandedCharts" style="margin-top:14px"><div id="chartSummaryGauge" class="chartBox"></div><div id="chartMode" class="chartBox"></div><div id="chartHealth" class="chartBox"></div><div id="chartProgress" class="chartBox"></div><div id="chartConfidenceArea" class="chartBox wide"></div><div id="chartSummaryBudget" class="chartBox wide"></div><div id="chartBudgetWaterfall" class="chartBox"></div><div id="chartBubbleExposure" class="chartBox"></div><div id="chartSummaryRisks" class="chartBox"></div><div id="chartRiskHeatmap" class="chartBox"></div><div id="chartSummaryResources" class="chartBox"></div><div id="chartMaturityRadar" class="chartBox"></div><div id="chartAttentionFunnel" class="chartBox"></div><div id="chartResourceTreemap" class="chartBox"></div><div id="chartPortfolioTimeline" class="chartBox wide"></div><div id="chartPortfolioRiskBubble" class="chartBox"></div></div>`;
  } else if(state.summaryTab==='reports') {
    html+=`<div class="card" style="margin-top:14px"><div class="cardTitle"><h3>Consolidated Management Report</h3><span class="eyebrow">All projects only</span></div>${summaryTable(projs,metrics,true)}</div><div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>Projects Needing Attention</h3></div>${attentionTable(projs,metrics)}</div><div class="card"><div class="cardTitle"><h3>Operating Model Mix</h3></div><div id="chartMode" class="chartBox compact"></div></div></div>`;
  } else if(state.summaryTab==='budget') {
    html+=`<div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>All Projects Budget Summary</h3><span class="eyebrow">Planned, actual and forecast</span></div>${summaryBudgetTable()}</div><div class="card"><div class="cardTitle"><h3>Budget Exposure Chart</h3></div><div id="chartSummaryBudget" class="chartBox"></div></div></div>`;
  } else if(state.summaryTab==='resources') {
    html+=`<div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>Resource Allocation Across Projects</h3><span class="eyebrow">Master resource view</span></div>${summaryResourceTable()}</div><div class="card"><div class="cardTitle"><h3>Resource Capacity</h3></div><div id="chartSummaryResources" class="chartBox"></div></div></div>`;
  } else if(state.summaryTab==='risks') {
    html+=`<div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>Open Risk Register Across Projects</h3></div>${summaryRiskTable()}</div><div class="card"><div class="cardTitle"><h3>Risk Exposure</h3></div><div id="chartSummaryRisks" class="chartBox"></div></div></div>`;
  }
  return html;
}
function summaryTable(projs,metrics,wide=false){return `<div class="tableWrap"><table><thead><tr><th>Project</th><th>Model</th><th>Status</th><th>Health</th><th>Budget</th><th>Forecast</th><th>Progress</th><th>SPI</th><th>CPI</th><th>Open</th></tr></thead><tbody>${projs.map((p,i)=>{const m=metrics[i];return `<tr><td><b>${esc(p.name)}</b><div class="hint">${esc(p.client||'')}</div></td><td>${modeBadge(p.mode)}</td><td>${statusBadge(p.status)}</td><td><span class="badge ${m.health>=80?'bGreen':m.health>=60?'bWarn':'bRed'}">${m.health}%</span></td><td class="mono">${money(m.planned,p.currency)}</td><td class="mono">${money(m.forecast,p.currency)}</td><td><div style="min-width:110px">${pctBar(m.progress)}</div></td><td class="mono">${m.spi.toFixed(2)}</td><td class="mono">${m.cpi.toFixed(2)}</td><td><button class="btn sm primary" onclick="openProject('${p.id}','cockpit')">Open</button></td></tr>`}).join('')}</tbody></table></div>`}
function attentionTable(projs,metrics){const rows=projs.map((p,i)=>({p,m:metrics[i]})).filter(x=>x.m.health<75||x.m.spi<.95||x.m.cpi<.95||x.m.openRisks.length);if(!rows.length)return '<div class="hint">No major issues detected across the current project sample.</div>';return `<div class="tableWrap"><table><thead><tr><th>Project</th><th>Signal</th><th>Reason</th><th>Action</th></tr></thead><tbody>${rows.map(({p,m})=>`<tr><td><b>${esc(p.name)}</b></td><td><span class="badge ${m.health>=70?'bWarn':'bRed'}">${m.health}% health</span></td><td class="hint">SPI ${m.spi.toFixed(2)}, CPI ${m.cpi.toFixed(2)}, risks ${m.openRisks.length}</td><td><button class="btn sm" onclick="openProject('${p.id}','reports')">Project report</button></td></tr>`).join('')}</tbody></table></div>`}
function summaryBudgetTable(){const rows=db.projects.map(p=>{const m=projectMetrics(p);return {p,m,variance:m.planned-m.forecast}});return `<div class="tableWrap"><table><thead><tr><th>Project</th><th>Planned</th><th>Actual</th><th>Forecast</th><th>Variance</th><th>Open Budget</th></tr></thead><tbody>${rows.map(({p,m,variance})=>`<tr><td><b>${esc(p.name)}</b></td><td class="mono">${money(m.planned,p.currency)}</td><td class="mono">${money(m.actual,p.currency)}</td><td class="mono">${money(m.forecast,p.currency)}</td><td class="mono" style="color:${variance>=0?'var(--accent)':'var(--danger)'}">${money(variance,p.currency)}</td><td><button class="btn sm" onclick="openProject('${p.id}','budget')">Budget</button></td></tr>`).join('')}</tbody></table></div>`}
function summaryResourceTable(){const rows=db.resources.map(r=>{const projects=db.projects.filter(p=>(p.resourceIds||[]).includes(r.id));return {r,projects}});return `<div class="tableWrap"><table><thead><tr><th>Resource</th><th>Designation</th><th>Location</th><th>Capacity</th><th>Projects</th><th>Rate</th></tr></thead><tbody>${rows.map(({r,projects})=>`<tr><td><b>${esc(r.name)}</b></td><td>${esc(r.designation||'')}</td><td>${esc(r.location||'')}</td><td>${pctBar(r.capacity||100)}</td><td class="hint">${projects.map(p=>esc(p.name)).join(', ')||'Not assigned'}</td><td class="mono">${money(r.rate||0)}</td></tr>`).join('')}</tbody></table></div>`}
function summaryRiskTable(){const risks=db.risks.filter(r=>r.status!=='Closed'&&r.status!=='Mitigated');return `<div class="tableWrap"><table><thead><tr><th>Project</th><th>Risk</th><th>Category</th><th>Score</th><th>Owner</th><th>Open Project</th></tr></thead><tbody>${risks.map(r=>{const p=db.projects.find(x=>x.id===r.projectId);const sc=(+r.prob||0)*(+r.impact||0);return `<tr><td><b>${esc(p?.name||'')}</b></td><td>${esc(r.title||'')}</td><td>${esc(r.category||'')}</td><td><span class="badge ${sc>=15?'bRed':sc>=8?'bWarn':'bGreen'}">${sc}</span></td><td>${esc(db.resources.find(x=>x.id===r.owner)?.name||r.owner||'')}</td><td><button class="btn sm" onclick="openProject('${r.projectId}','raid')">RAID</button></td></tr>`}).join('')}</tbody></table></div>`}
function renderResourcesViewV2(p){const people=projectResources(p.id);return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openProjectModal('${p.id}')">Select Project Team</button><button class="btn" onclick="openResourceModal()">+ Add Resource to Master</button><button class="btn" onclick="printProjectChartsPDF()">Download Project PDF</button></div></div><div class="grid kpi"><div class="card kpiCard"><div class="kpiLabel">Team Members</div><div class="kpiValue">${people.length}</div><div class="kpiSub">Selected for this project</div></div><div class="card kpiCard"><div class="kpiLabel">Avg Capacity</div><div class="kpiValue">${people.length?Math.round(people.reduce((a,r)=>a+(+r.capacity||0),0)/people.length):0}%</div><div class="kpiSub">Across selected team</div></div><div class="card kpiCard"><div class="kpiLabel">Daily Burn Rate</div><div class="kpiValue" style="font-size:22px">${money(people.reduce((a,r)=>a+(+r.rate||0),0),p.currency)}</div><div class="kpiSub">Rate total per day</div></div></div><div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>Project Team Members</h3><span class="eyebrow">Project-scoped</span></div>${people.length?`<div class="tableWrap"><table><thead><tr><th>Name</th><th>Designation</th><th>Location</th><th>Skills</th><th>Capacity</th><th>Rate</th></tr></thead><tbody>${people.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td>${esc(r.designation||'')}</td><td>${esc(r.location||'')}</td><td class="hint">${esc(r.skills||'')}</td><td>${pctBar(r.capacity||100)}</td><td class="mono">${money(r.rate,p.currency)}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty"><div class="emptyIcon">♙</div><h3>No team selected</h3><p>Edit the project and select resources, or add a resource to the master first.</p></div>`}</div><div class="card"><div class="cardTitle"><h3>Team Capacity Chart</h3></div><div id="chartResource" class="chartBox"></div></div></div>`}

t details</span></div><div class="btnRow"><button class="btn" onclick="navTo('budget')">Budget</button><button class="btn" onclick="navTo('resources')">Team</button><button class="btn" onclick="navTo('raid')">RAID</button><button class="btn" onclick="navTo('ai')">AI Prediction</button></div><div class="hint" style="margin-top:12px">Each section is project-specific. The top dropdown changes the selected project and refreshes every report automatically.</div></div></div><div class="chartGrid expandedCharts"><div id="chartProjectGauge" class="chartBox"></div><div id="chartProjectHealth" class="chartBox wide"></div><div id="chartCostCurveProject" class="chartBox wide"></div><div id="chartBudget2" class="chartBox wide"></div><div id="chartBudgetWaterfallProject" class="chartBox"></div><div id="chartWorkStatus" class="chartBox"></div><div id="chartFlowStack" class="chartBox"></div><div id="chartResource" class="chartBox"></div><div id="chartResourceTreemapProject" class="chartBox"></div><div id="chartTeamBubble" class="chartBox"></div><div id="chartRiskBars" class="chartBox"></div><div id="chartRiskHeatmapProject" class="chartBox"></div><div id="chartRiskBubbleProject" class="chartBox"></div><div id="chartFloat" class="chartBox"></div><div id="chartTaskDurationLollipop" class="chartBox"></div><div id="chartProgressRadar" class="chartBox"></div><div id="chartMilestoneTimeline" class="chartBox wide"></div></div><div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>Budget Detail</h3><span class="eyebrow">${esc(p.currency||'')}</span></div>${budget.length?`<div class="tableWrap"><table><thead><tr><th>Category</th><th>Item</th><th>Planned</th><th>Actual</th><th>Forecast</th></tr></thead><tbody>${budget.map(b=>`<tr><td>${esc(b.category)}</td><td>${esc(b.item)}</td><td class="mono">${money(b.planned,p.currency)}</td><td class="mono">${money(b.actual,p.currency)}</td><td class="mono">${money(b.forecast,p.currency)}</td></tr>`).join('')}</tbody></table></div>`:'<div class="hint">No budget line items defined.</div>'}</div><div class="card"><div class="cardTitle"><h3>Team Members</h3><span class="eyebrow">Selected project team</span></div>${people.length?`<div class="tableWrap"><table><thead><tr><th>Name</th><th>Designation</th><th>Capacity</th><th>Rate</th></tr></thead><tbody>${people.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td>${esc(r.designation||'')}</td><td>${pctBar(r.capacity||0)}</td><td class="mono">${money(r.rate,p.currency)}</td></tr>`).join('')}</tbody></table></div>`:'<div class="hint">No team members selected.</div>'}</div></div><div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>Work Item Report</h3></div><div class="tableWrap"><table><thead><tr><th>Type</th><th>Name</th><th>Status</th><th>Progress / Points</th></tr></thead><tbody>${tasks.slice(0,12).map(t=>`<tr><td>WBS ${esc(t.wbs)}</td><td>${esc(t.name)}</td><td>${t.critical?'<span class="badge bRed">Critical</span>':statusBadge(t.percent>=100?'Done':t.percent>0?'In Progress':'Not Started')}</td><td>${pctBar(t.percent||0)}</td></tr>`).join('')}${stories.slice(0,12).map(s=>`<tr><td>Story</td><td>${esc(s.title)}</td><td>${statusBadge(s.status)}</td><td class="mono">${s.points||0} pts</td></tr>`).join('')}</tbody></table></div></div><div class="card"><div class="cardTitle"><h3>Risk Report</h3></div>${risks.length?`<div class="tableWrap"><table><thead><tr><th>Risk</th><th>Category</th><th>Score</th><th>Status</th></tr></thead><tbody>${risks.map(r=>{const sc=(+r.prob||0)*(+r.impact||0);return `<tr><td>${esc(r.title)}</td><td>${esc(r.category)}</td><td><span class="badge ${sc>=15?'bRed':sc>=8?'bWarn':'bGreen'}">${sc}</span></td><td>${statusBadge(r.status)}</td></tr>`}).join('')}</tbody></table></div>`:'<div class="hint">No risks logged.</div>'}</div></div>`}
function drawChartsForView(){
  if(state.view==='summary'){
    const metrics=db.projects.map(projectMetrics);
    const avg=metrics.length?Math.round(metrics.reduce((a,m)=>a+m.health,0)/metrics.length):0;
    if(document.getElementById('chartSummaryGauge'))drawGauge('chartSummaryGauge','Portfolio Health Gauge',avg,100,'%');
    if(document.getElementById('chartMode'))drawDonut('chartMode','Project Models',countBy(db.projects,p=>p.mode));
    if(document.getElementById('chartHealth'))drawBar('chartHealth','Project Health',db.projects.map(p=>p.name),metrics.map(m=>m.health),'Health %');
    if(document.getElementById('chartProgress'))drawArea('chartProgress','Progress Trend by Project',db.projects.map(p=>p.name),metrics.map(m=>Math.round(m.progress)),'Progress %',100);
    if(document.getElementById('chartConfidenceArea'))drawArea('chartConfidenceArea','Delivery Confidence Trend',['W-5','W-4','W-3','W-2','W-1','Now'],confidenceTrend(avg),'Confidence %',100);
    if(document.getElementById('chartSummaryBudget'))drawGrouped('chartSummaryBudget','Budget: Planned vs Actual vs Forecast',db.projects.map(p=>p.name),[{name:'Planned',data:metrics.map(m=>m.planned),color:cssVar('--primary')},{name:'Actual',data:metrics.map(m=>m.actual),color:cssVar('--warn')},{name:'Forecast',data:metrics.map(m=>m.forecast),color:cssVar('--danger')}]);
    if(document.getElementById('chartBudgetWaterfall'))drawWaterfall('chartBudgetWaterfall','Portfolio Budget Waterfall',portfolioWaterfall(metrics));
    if(document.getElementById('chartBubbleExposure'))drawBubble('chartBubbleExposure','Schedule vs Budget Exposure',db.projects.map((p,i)=>({label:p.name,x:Math.round((1-metrics[i].spi)*100),y:Math.round((metrics[i].forecast-metrics[i].planned)/Math.max(1,metrics[i].planned)*100),r:8+metrics[i].openRisks.length*3,color:p.color||COLORS[i%COLORS.length],tip:`${p.name} · SPI ${metrics[i].spi.toFixed(2)} · budget variance ${Math.round((metrics[i].forecast-metrics[i].planned)/Math.max(1,metrics[i].planned)*100)}%`})),{xLabel:'Schedule pressure',yLabel:'Budget variance %'});
    if(document.getElementById('chartSummaryRisks'))drawBar('chartSummaryRisks','Open Risks by Project',db.projects.map(p=>p.name),metrics.map(m=>m.openRisks.length),'Open risks');
    if(document.getElementById('chartRiskHeatmap'))drawRiskHeatmap('chartRiskHeatmap','Portfolio Risk Heatmap',db.risks);
    if(document.getElementById('chartSummaryResources'))drawHorizontalBar('chartSummaryResources','Team Size by Project',db.projects.map(p=>p.name),db.projects.map(p=>projectResources(p.id).length),'Team members');
    if(document.getElementById('chartMaturityRadar'))drawRadar('chartMaturityRadar','Portfolio Control Radar',['Schedule','Cost','Risk','Resources','Agile','Governance'],portfolioRadar(metrics),100);
    if(document.getElementById('chartAttentionFunnel'))drawFunnel('chartAttentionFunnel','Delivery Attention Funnel',portfolioFunnel(metrics));
    if(document.getElementById('chartResourceTreemap'))drawTreemap('chartResourceTreemap','Resource Cost Treemap',db.resources.map((r,i)=>({label:r.name,value:+r.rate||1,color:COLORS[i%COLORS.length],tip:`${r.name} · rate ${fmt(r.rate||0)} · capacity ${r.capacity||0}%`})));
    if(document.getElementById('chartPortfolioTimeline'))drawTimeline('chartPortfolioTimeline','Upcoming Project Milestones',portfolioTimelineItems());
    if(document.getElementById('chartPortfolioRiskBubble'))drawBubble('chartPortfolioRiskBubble','Risk Probability × Impact Bubble',db.risks.filter(r=>r.status!=='Closed'&&r.status!=='Mitigated').map((r,i)=>({label:r.category||r.title,x:+r.prob||0,y:+r.impact||0,r:7+(+r.prob||0)*(+r.impact||0)/1.5,color:(+r.prob||0)*(+r.impact||0)>=15?cssVar('--danger'):(+r.prob||0)*(+r.impact||0)>=8?cssVar('--warn'):cssVar('--accent'),tip:`${r.category||'Risk'} · ${r.title} · P${r.prob} I${r.impact}`})),{xLabel:'Probability',yLabel:'Impact'});
  }
  if(state.view==='scrum'){const p=getP();const s=p&&activeSprint(p.id);if(s){drawBurndown('chartBurndown',p,s);drawVelocity('chartVelocity',p)}else if(document.getElementById('chartBurndown')){document.getElementById('chartBurndown').innerHTML='<div class="empty"><h3>No active sprint</h3></div>';if(p)drawVelocity('chartVelocity',p)}}
  if(state.view==='budget'){const p=getP();if(p)drawBudget('chartBudget',p)}
  if(state.view==='raid'){const p=getP();if(p)drawRiskMatrix('chartRiskMatrix',p)}
  if(state.view==='reports'){const p=getP();if(p)drawReportCharts(p)}
  if(state.view==='resources'){const p=getP();if(p)drawHorizontalBar('chartResource','Team Capacity',projectResources(p.id).map(r=>r.name),projectResources(p.id).map(r=>r.capacity||0),'Capacity %')}
}
function svgWrap(inner,w=640,h=320){return `<svg class="chartSvg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" role="img">${inner}</svg>`}
function axis(w,h,pad,max){const line=cssVar('--line2'),muted=cssVar('--muted');let s=`<line x1="${pad}" y1="${h-44}" x2="${w-pad+10}" y2="${h-44}" stroke="${line}"/><line x1="${pad}" y1="44" x2="${pad}" y2="${h-44}" stroke="${line}"/>`;for(let i=0;i<=4;i++){const y=h-44-i*(h-92)/4;const v=max*i/4;s+=`<line x1="${pad}" y1="${y}" x2="${w-pad+10}" y2="${y}" stroke="${line}" opacity=".45"/><text x="${pad-8}" y="${y+4}" text-anchor="end" fill="${muted}" font-size="10">${fmt(v)}</text>`}return s}
function drawBar(id,title,labels,values,label='Value'){
  const el=document.getElementById(id);if(!el)return;const w=640,h=320,pad=54,max=Math.max(1,...values.map(v=>+v||0));const bw=(w-pad*2)/Math.max(1,values.length);let s=`<text x="${pad}" y="25" fill="${cssVar('--text')}" font-size="14" font-weight="950">${esc(title)}</text>${axis(w,h,pad,max)}`;
  values.forEach((v,i)=>{v=+v||0;const bh=(h-98)*(v/max),x=pad+i*bw+Math.max(6,bw*.16),barw=Math.max(8,bw*.68),y=h-44-bh,lab=String(labels[i]||'');s+=`<rect class="chartBar" data-tip="${esc(lab)} · ${esc(label)}: ${fmt(v)}" x="${x}" y="${y}" width="${barw}" height="${bh}" rx="8" fill="${COLORS[i%COLORS.length]}" opacity=".82"/><text x="${x+barw/2}" y="${Math.max(40,y-6)}" text-anchor="middle" fill="${cssVar('--muted')}" font-size="10" font-weight="800">${fmt(v)}</text><text x="${x+barw/2}" y="${h-16}" text-anchor="middle" fill="${cssVar('--muted')}" font-size="9" font-weight="800">${esc(lab.slice(0,12))}</text>`});
  el.innerHTML=svgWrap(s,w,h);
}
function drawGrouped(id,title,labels,series){const el=document.getElementById(id);if(!el)return;const w=680,h=320,pad=56,max=Math.max(1,...series.flatMap(s=>s.data.map(v=>+v||0)));const group=(w-pad*2)/Math.max(1,labels.length),barW=Math.max(7,(group-18)/Math.max(1,series.length));let out=`<text x="${pad}" y="25" fill="${cssVar('--text')}" font-size="14" font-weight="950">${esc(title)}</text>${axis(w,h,pad,max)}`;labels.forEach((lab,i)=>{series.forEach((sr,j)=>{const v=+sr.data[i]||0,bh=(h-98)*(v/max),x=pad+i*group+9+j*barW,y=h-44-bh;out+=`<rect class="chartBar" data-tip="${esc(lab)} · ${esc(sr.name)}: ${fmt(v)}" x="${x}" y="${y}" width="${Math.max(5,barW-3)}" height="${bh}" rx="5" fill="${sr.color}" opacity=".82"/>`});out+=`<text x="${pad+i*group+group/2}" y="${h-16}" text-anchor="middle" fill="${cssVar('--muted')}" font-size="9" font-weight="800">${esc(String(lab).slice(0,12))}</text>`});let lx=pad,ly=43;series.forEach((sr,i)=>{out+=`<rect x="${lx}" y="${ly-10}" width="10" height="10" rx="3" fill="${sr.color}"/><text x="${lx+15}" y="${ly-1}" fill="${cssVar('--muted')}" font-size="10" font-weight="850">${esc(sr.name)}</text>`;lx+=92});el.innerHTML=svgWrap(out,w,h)}
function drawDonut(id,title,obj){const el=document.getElementById(id);if(!el)return;const entries=Object.entries(obj);const total=entries.reduce((a,e)=>a+e[1],0)||1;let angle=0,segs='';entries.forEach(([k,v],i)=>{const a1=angle,a2=angle+v/total*360;angle=a2;segs+=donutSeg(145,160,85,38,a1,a2,COLORS[i%COLORS.length],`${k}: ${v}`)});let legend=entries.map(([k,v],i)=>`<span class="badge bGray"><span style="width:8px;height:8px;background:${COLORS[i%COLORS.length]};border-radius:50%;display:inline-block"></span>${esc(k)} ${v}</span>`).join('');el.innerHTML=`${svgWrap(`<text x="34" y="28" fill="${cssVar('--text')}" font-size="14" font-weight="950">${esc(title)}</text>${segs}<text x="145" y="168" text-anchor="middle" fill="${cssVar('--text')}" font-size="28" font-weight="950">${total}</text><text x="145" y="188" text-anchor="middle" fill="${cssVar('--muted')}" font-size="10" font-weight="850">total</text>`,360,320)}<div class="btnRow" style="justify-content:center;margin-top:-30px;position:relative;z-index:1">${legend}</div>`}
function donutSeg(cx,cy,r,th,a1,a2,color,tip=''){const rad=a=>((a-90)*Math.PI/180),large=a2-a1>180?1:0;const x1=cx+r*Math.cos(rad(a1)),y1=cy+r*Math.sin(rad(a1)),x2=cx+r*Math.cos(rad(a2)),y2=cy+r*Math.sin(rad(a2));const r2=r-th;const x3=cx+r2*Math.cos(rad(a2)),y3=cy+r2*Math.sin(rad(a2)),x4=cx+r2*Math.cos(rad(a1)),y4=cy+r2*Math.sin(rad(a1));return `<path class="chartSeg" data-tip="${esc(tip)}" d="M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${r2},${r2} 0 ${large} 0 ${x4},${y4} Z" fill="${color}" opacity=".84"/>`}

function drawGauge(id,title,value,max=100,suffix='%'){
  const el=document.getElementById(id);if(!el)return;value=clamp(value,0,max);const w=420,h=320,cx=210,cy=198,r=104;const pctVal=value/max;const start=-210,end=30,ang=start+(end-start)*pctVal;const arc=(a1,a2,color,cls='')=>{const p1=polar(cx,cy,r,a1),p2=polar(cx,cy,r,a2),large=Math.abs(a2-a1)>180?1:0;return `<path class="${cls}" d="M${p1.x},${p1.y} A${r},${r} 0 ${large} 1 ${p2.x},${p2.y}" fill="none" stroke="${color}" stroke-width="22" stroke-linecap="round"/>`};
  const marker=polar(cx,cy,r,ang);const color=value>=80?cssVar('--accent'):value>=60?cssVar('--warn'):cssVar('--danger');let s=`<text x="28" y="28" fill="${cssVar('--text')}" font-size="14" font-weight="950">${esc(title)}</text>${arc(start,end,cssVar('--line2'))}${arc(start,ang,color,'chartArc')}<circle data-tip="${esc(title)}: ${fmt(value)}${suffix}" cx="${marker.x}" cy="${marker.y}" r="7" fill="${color}"/><text x="${cx}" y="190" text-anchor="middle" fill="${cssVar('--text')}" font-size="44" font-weight="950">${fmt(value)}</text><text x="${cx}" y="214" text-anchor="middle" fill="${cssVar('--muted')}" font-size="12" font-weight="900">${suffix==='%'?'delivery confidence':'score'}</text><text x="88" y="276" fill="${cssVar('--danger')}" font-size="10" font-weight="900">Risk</text><text x="190" y="276" fill="${cssVar('--warn')}" font-size="10" font-weight="900">Watch</text><text x="298" y="276" fill="${cssVar('--accent')}" font-size="10" font-weight="900">Healthy</text>`;el.innerHTML=svgWrap(s,w,h);

function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}}

  if(document.getElementById('chartRiskBars'))drawBar('chartRiskBars','Risk Scores',risks.map(r=>r.category),risks.map(r=>r.prob*r.impact),'Risk score');

  if(document.getElementById('chartRiskBubbleProject'))drawBubble('chartRiskBubbleProject','Risk Probability × Impact Bubble',risks.map((r,i)=>({label:r.category||r.title,x:+r.prob||0,y:+r.impact||0,r:7+(+r.prob||0)*(+r.impact||0)/1.5,color:(+r.prob||0)*(+r.impact||0)>=15?cssVar('--danger'):(+r.prob||0)*(+r.impact||0)>=8?cssVar('--warn'):cssVar('--accent'),tip:`${r.title} · P${r.prob} I${r.impact} score ${(+r.prob||0)*(+r.impact||0)}`})),{xLabel:'Probability',yLabel:'Impact'});
  if(document.getElementById('chartFloat'))drawBar('chartFloat','Task Float',tasks.map(t=>t.wbs),tasks.map(t=>t.float||0),'Float days');
  if(document.getElementById('chartTaskDurationLollipop'))drawLollipop('chartTaskDurationLollipop','Task Duration Lollipop',tasks.slice(0,12).map(t=>t.wbs),tasks.slice(0,12).map(t=>t.duration||durDays(t.startDate,t.finishDate)),'Duration days');
  if(document.getElementById('chartProgressRadar'))drawRadar('chartProgressRadar','Project Control Radar',['Schedule','Cost','Scope','Risk','Team','Quality'],[clamp(m.spi*100,0,100),clamp(m.cpi*100,0,100),m.progress,clamp(100-risks.length*12,0,100),team.length?80:40,clamp(tasks.filter(t=>(+t.percent||0)>=100).length/Math.max(1,tasks.length)*100,0,100)].map(x=>Math.round(x)),100);

}

<script>
(function(){

  window.summaryTabs = function(){
    const tabs=[['overview','Overview'],['charts','Charts'],['reports','Reports'],['budget','Budget'],['resources','Resources'],['risks','Risks'],['ai','AI Prediction']];

  };
  window.portfolioAI = function(){
    const metrics=db.projects.map(projectMetrics);const count=metrics.length||1;
    const avgHealth=metrics.length?Math.round(metrics.reduce((a,m)=>a+m.health,0)/count):0;
    const schedRisk=Math.round(clamp(metrics.reduce((a,m)=>a+Math.max(0,1-m.spi),0)/count*100,0,100));
    const costRisk=Math.round(clamp(metrics.reduce((a,m)=>a+Math.max(0,(m.forecast-m.planned)/Math.max(1,m.planned)),0)/count*100,0,100));
    const riskExposure=Math.round(clamp(db.risks.filter(r=>r.status!=='Closed'&&r.status!=='Mitigated').reduce((a,r)=>a+(+r.prob||0)*(+r.impact||0),0)/(count*6),0,100));
    const overload=Math.round(clamp(db.resources.filter(r=>resourceLoad(r.id)>100).length/Math.max(1,db.resources.length)*100,0,100));
    const agileRisk=Math.round(clamp(db.projects.filter(p=>canScrum(p)).reduce((a,p)=>{const s=activeSprint(p.id);return a+(s?sprintMetrics(p.id,s.id).burnRisk:30)},0)/Math.max(1,db.projects.filter(p=>canScrum(p)).length),0,100));
    const confidence=Math.round(clamp(avgHealth-(schedRisk*.18)-(costRisk*.18)-(riskExposure*.18)-(overload*.12)-(agileRisk*.10),0,100));
    const rec=[];
    if(schedRisk>20)rec.push('Review milestone slippage and confirm critical path recovery plans for projects with SPI below 0.95.');
    if(costRisk>12)rec.push('Freeze non-essential spend, revalidate forecast-to-complete, and separate committed vs actual cost.');
    if(riskExposure>35)rec.push('Escalate top risk items using probability x impact score and assign mitigation owners.');
    if(overload>20)rec.push('Rebalance overloaded resources and reduce parallel critical-path ownership.');
    if(agileRisk>45)rec.push('Replan active sprint scope and prioritize blockers before adding new stories.');
    if(!rec.length)rec.push('Portfolio is stable. Keep baseline, sprint, budget and risk reviews on a weekly rhythm.');
    return {confidence,avgHealth,schedRisk,costRisk,riskExposure,overload,agileRisk,rec};
  };

i.confidence>=60?'Watch list portfolio. Address specific weak signals.':'High stress portfolio. Immediate recovery governance recommended.'}</p></div><div class="aiInsight"><div class="score">${ai.agileRisk}%</div><b>Sprint failure risk</b><p class="hint">Driven by active sprint burn remaining, blocked stories and unfinished story points.</p></div><div class="aiInsight"><div class="score">${ai.overload}%</div><b>Burnout signal</b><p class="hint">Flags people with too many open tasks or story points versus capacity.</p></div></div></div><div class="card"><div class="cardTitle"><h3>Recommended PM Actions</h3></div><ol class="hint" style="line-height:1.75;margin:0;padding-left:18px">${ai.rec.map(x=>`<li>${esc(x)}</li>`).join('')}</ol></div></div><div class="chartGrid expandedCharts" style="margin-top:14px"><div id="chartOverallAiGauge" class="chartBox"></div><div id="chartOverallStressRadar" class="chartBox"></div><div id="chartOverallRiskForecast" class="chartBox"></div><div id="chartOverallBudgetForecast" class="chartBox wide"></div><div id="chartOverallAttentionFunnel" class="chartBox"></div><div id="chartOverallStressBubble" class="chartBox"></div></div>`;

><div class="card"><div class="cardTitle"><h3>Critical Path / Sprint Insight</h3></div><div class="tableWrap"><table><thead><tr><th>Signal</th><th>Observation</th><th>Action</th></tr></thead><tbody><tr><td>Schedule</td><td>SPI ${m.spi.toFixed(2)}; ${m.overdue.length} overdue tasks.</td><td>Reconfirm baseline and recovery path.</td></tr><tr><td>Budget</td><td>CPI ${m.cpi.toFixed(2)}; forecast ${money(m.forecast,p.currency)}.</td><td>Validate ETC and remaining commitments.</td></tr><tr><td>Risk</td><td>${m.openRisks.length} open risks.</td><td>Escalate high P x I risks.</td></tr>${burn?`<tr><td>Sprint</td><td>${burn.remaining}/${burn.total} points remaining; burn risk ${Math.round(burn.burnRisk)}%.</td><td>Resolve blockers and reduce scope if needed.</td></tr>`:''}</tbody></table></div></div></div>`;

  window.renderHelp = function(){

<div class="screenCard"><div class="screenMock"></div><b>Reports and Charts</b><div class="hint">Hover charts to view exact values. Use PDF buttons to print or save reports.</div></div></div></div></div><div class="grid two" style="margin-top:14px"><div class="card"><div class="cardTitle"><h3>Do's and Don'ts</h3></div><div class="doDont"><div class="doBox"><b>Do</b><ul class="checkList"><li>Pick the correct delivery model before planning.</li><li>Keep WBS dates, dependencies and baseline current.</li><li>Review SPI, CPI, risk heatmap and AI prediction weekly.</li><li>Separate planned, actual and forecast budget values.</li><li>Use Hybrid Links when sprint stories deliver fixed milestones.</li></ul></div><div class="dontBox"><b>Don't</b><ul class="checkList"><li>Do not track selected-project work inside summary views.</li><li>Do not use Gantt for Scrum-only work unless the project is Hybrid.</li><li>Do not ignore blocked stories, overdue tasks or zero-float critical path tasks.</li><li>Do not overwrite baseline after slippage without governance approval.</li><li>Do not treat AI prediction as final truth; use it as an early-warning assistant.</li></ul></div></div></div><div class="card"><div class="cardTitle"><h3>Industry Best Practices</h3></div><ul class="checkList hint"><li><b>PMBOK alignment:</b> maintain charter, scope baseline, schedule baseline, cost baseline, risk register, change control and stakeholder communications.</li><li><b>Waterfall:</b> confirm acceptance criteria, dependencies, critical path, baseline and formal approvals.</li><li><b>Scrum:</b> keep the product backlog ordered, plan sprint goals, maintain WIP discipline and review burndown daily.</li><li><b>Hybrid:</b> do governance at deliverable level and execution at story level; keep traceability explicit.</li><li><b>Reporting:</b> use a mix of trend, matrix, radar, funnel, heatmap, gauge, waterfall and table views. One chart type never tells the full story.</li></ul></div></div><div class="card" style="margin-top:14px"><div class="cardTitle"><h3>Model Selection Guide</h3></div><div class="mustGrid"><div class="mustCard"><h4>Fixed Bid / Waterfall</h4><p class="hint">Best when deliverables, cost, timeline and acceptance criteria are mostly fixed. Use WBS, Gantt, CPM, dependencies, baseline and EVM.</p></div><div class="mustCard"><h4>Agile Scrum / T&M</h4><p class="hint">Best when scope evolves sprint-by-sprint. Use backlog, sprint board, story points, burndown, burnup, velocity and sprint health.</p></div><div class="mustCard"><h4>Hybrid</h4><p class="hint">Best when high-level milestones are fixed but detailed implementation is agile. Use both Gantt and Sprint Board, then link stories to WBS deliverables.</p></div></div></div>`;

  window.renderAppendix = function(){
    return `<div class="card"><div class="cardTitle"><h3>Formula and Calculation Appendix</h3><span class="eyebrow">PMBOK + Agile/Scrum + AI scoring</span></div><div class="formulaGrid"><div class="formulaCard"><b>Earned Value (EV)</b><code>EV = Approved Budget x Percent Complete</code><p class="hint">Represents the value of completed work.</p></div><div class="formulaCard"><b>Planned Value (PV)</b><code>PV = Approved Budget x Planned Elapsed Percent</code><p class="hint">Represents the budgeted value of work planned by today.</p></div><div class="formulaCard"><b>Actual Cost (AC)</b><code>AC = Sum of actual budget line items</code><p class="hint">Actual cost spent or recorded so far.</p></div><div class="formulaCard"><b>SPI</b><code>SPI = EV / PV</code><p class="hint">Below 1.00 indicates schedule underperformance.</p></div><div class="formulaCard"><b>CPI</b><code>CPI = EV / AC</code><p class="hint">Below 1.00 indicates cost inefficiency.</p></div><div class="formulaCard"><b>Schedule Variance</b><code>SV = EV - PV</code><p class="hint">Negative value means behind planned progress.</p></div><div class="formulaCard"><b>Cost Variance</b><code>CV = EV - AC</code><p class="hint">Negative value means cost overrun.</p></div><div class="formulaCard"><b>Estimate at Completion</b><code>EAC = Forecast cost, or BAC / CPI when forecast is not defined</code><p class="hint">Used for budget overrun prediction.</p></div><div class="formulaCard"><b>Risk Score</b><code>Risk Score = Probability x Impact</code><p class="hint">Usually 1-25 on a 5 x 5 matrix.</p></div><div class="formulaCard"><b>Critical Path Float</b><code>Total Float = Latest Start - Earliest Start</code><p class="hint">Zero-float tasks are critical and highlighted in the Gantt.</p></div><div class="formulaCard"><b>Dependency Logic</b><code>FS, SS, FF, SF with lead/lag, e.g. 1.2FS+2</code><p class="hint">The scheduling engine recalculates successor dates when predecessors move.</p></div><div class="formulaCard"><b>Baseline Slippage</b><code>Slippage = Current Finish - Baseline Finish</code><p class="hint">Baseline bars are displayed under live Gantt bars.</p></div><div class="formulaCard"><b>Velocity</b><code>Velocity = Sum of completed story points in sprint</code><p class="hint">Used for sprint and release forecasting.</p></div><div class="formulaCard"><b>Burndown</b><code>Remaining Points = Total Sprint Points - Done Points</code><p class="hint">Actual remaining points are compared against the ideal burn line.</p></div><div class="formulaCard"><b>Burnup</b><code>Completed Points over Time vs Scope Line</code><p class="hint">Shows delivery growth and scope movement.</p></div><div class="formulaCard"><b>AI Confidence</b><code>Confidence = 100 - schedule penalty - cost penalty - risk penalty - overload penalty - sprint penalty</code><p class="hint">A local rule-based score. It is not an external AI call.</p></div></div></div><div class="card" style="margin-top:14px"><div class="cardTitle"><h3>Report Interpretation Guide</h3></div><div class="mustGrid"><div class="mustCard"><h4>Gauge</h4><p class="hint">Quick executive health. Use it for a fast status read, not root-cause analysis.</p></div><div class="mustCard"><h4>Radar</h4><p class="hint">Compares multiple PMBOK or agile dimensions at once.</p></div><div class="mustCard"><h4>Waterfall</h4><p class="hint">Explains how budget moves from planned to actual, forecast and variance.</p></div><div class="mustCard"><h4>Heatmap</h4><p class="hint">Highlights concentration of risk or governance stress.</p></div><div class="mustCard"><h4>Bubble</h4><p class="hint">Shows three dimensions such as probability, impact and severity together.</p></div><div class="mustCard"><h4>Treemap</h4><p class="hint">Shows proportional cost or resource contribution.</p></div></div></div>`;

JavaScript, localStorage, SVG, CSS Grid/Flexbox and modern CSS variables. The application does not require internet connectivity after download.</p></div><div class="whitepaperBlock"><h4>Security and Privacy</h4><p class="hint">All project data stays on the user's computer/browser. The tool does not transmit data. Users should still avoid storing confidential client data in shared browsers and should use encrypted storage/device policies where needed.</p></div></div>`;

      drawGrouped('chartOverallBudgetForecast','Budget Forecast by Project',db.projects.map(p=>p.name),[{name:'Planned',data:metrics.map(m=>m.planned),color:cssVar('--primary')},{name:'Actual',data:metrics.map(m=>m.actual),color:cssVar('--warn')},{name:'Forecast',data:metrics.map(m=>m.forecast),color:cssVar('--danger')}]);
      drawFunnel('chartOverallAttentionFunnel','AI Attention Funnel',[{label:'All projects',value:db.projects.length},{label:'Watch list',value:metrics.filter(m=>m.health<80).length},{label:'At risk',value:metrics.filter(m=>m.health<65).length},{label:'Immediate action',value:metrics.filter(m=>m.health<50||m.spi<.9||m.cpi<.9).length}]);
      drawBubble('chartOverallStressBubble','Project Stress Bubble',db.projects.map((p,i)=>({label:p.name,x:Math.round((1-metrics[i].spi)*100),y:Math.round((metrics[i].forecast-metrics[i].planned)/Math.max(1,metrics[i].planned)*100),r:8+metrics[i].openRisks.length*3,color:p.color||COLORS[i%COLORS.length],tip:`${p.name}: health ${metrics[i].health}%, SPI ${metrics[i].spi.toFixed(2)}, CPI ${metrics[i].cpi.toFixed(2)}`})),{xLabel:'Schedule pressure',yLabel:'Budget pressure'});
    }

      drawRadar('chartAIPredictionRadar','Prediction Risk Radar',['Schedule','Budget','Risk','Team','Sprint'],[v.schedule,v.cost,v.risk,v.team,v.sprint],100);

      drawFunnel('chartAIActionFunnel','AI Action Funnel',[{label:'Signals scanned',value:6},{label:'Watch items',value:ai.indicators.filter(x=>x.score>35).length},{label:'High risk',value:ai.indicators.filter(x=>x.score>65).length},{label:'Immediate actions',value:ai.recommendations.length}]);
      if(document.getElementById('chartAISprintBurn')){const s=activeSprint(p.id);if(s)drawBurndown('chartAISprintBurn',p,s)}

  function qualityScore(p){const tasks=projectTasks(p.id).filter(t=>t.type!=='Summary');const done=tasks.filter(t=>+t.percent>=100).length;const risks=projectRisks(p.id).filter(r=>/quality|defect|test/i.test((r.category||'')+' '+(r.title||''))).length;return Math.round(clamp(done/Math.max(1,tasks.length)*100-risks*10,0,100));}

  function governanceScore(p){const b=projectBudgets(p.id).length?20:0,t=projectTasks(p.id).length?20:0,r=projectRisks(p.id).length?20:0,res=projectResources(p.id).length?20:0,rep=20;return b+t+r+res+rep;}
  function drawBurnup(id,p){const sps=projectSprints(p.id);if(!sps.length){const el=document.getElementById(id);if(el)el.innerHTML='<div class="empty"><h3>No sprint data</h3></div>';return}const labels=sps.map(s=>s.name.replace('Sprint ', 'S'));let done=[],scope=[],d=0,sc=0;sps.forEach(s=>{const m=sprintMetrics(p.id,s.id);d+=m.done;sc+=m.total;done.push(d);scope.push(sc)});drawMultiLine(id,'Burnup: Done vs Scope',labels,[{name:'Done',data:done,color:cssVar('--accent')},{name:'Scope',data:scope,color:cssVar('--primary')}]);}

<script>
/* ============================================================
   v1.1 Sprint Board Fix + Deep Navigation Stabilization Patch
   Fixes: selecting a named sprint now filters Kanban cards, sprint
   callout and burndown to the chosen sprint rather than always using
   the active sprint. Also resets sprint selection when changing project.
   ============================================================ */
(function(){
  'use strict';

  function sprintMode(){ return state.selectedSprint || 'active'; }

  window.normalizeSprintSelection = function(pid){
    const sprints = projectSprints(pid);
    const mode = sprintMode();
    const legal = ['active','backlog','all'];
    if(legal.includes(mode)) return mode;
    if(sprints.some(s => s.id === mode)) return mode;
    state.selectedSprint = 'active';
    return 'active';
  };

  window.selectedSprintForProject = function(pid){
    const sprints = projectSprints(pid);
    if(!sprints.length) return null;
    const mode = normalizeSprintSelection(pid);
    if(mode === 'all' || mode === 'backlog') return null;
    if(mode === 'active') return activeSprint(pid) || sprints[0] || null;
    return sprints.find(s => s.id === mode) || activeSprint(pid) || sprints[0] || null;
  };

  window.sprintFilterLabel = function(pid){
    const mode = normalizeSprintSelection(pid);
    if(mode === 'all') return {title:'All stories', subtitle:'Showing every backlog and sprint story for this project.'};
    if(mode === 'backlog') return {title:'Product Backlog', subtitle:'Showing stories not yet assigned to a sprint.'};
    const s = selectedSprintForProject(pid);
    return s ? {title:s.name, subtitle:`${s.goal || 'No sprint goal defined'} · ${niceDate(s.startDate)} to ${niceDate(s.endDate)} · ${s.status || 'Planned'}`} : {title:'No sprint selected', subtitle:'Create a sprint or choose All stories.'};
  };

  window.storiesForSprintSelection = function(pid){
    const mode = normalizeSprintSelection(pid);
    const all = projectStories(pid);
    if(mode === 'all') return all;
    if(mode === 'backlog') return all.filter(s => !s.sprintId);
    const s = selectedSprintForProject(pid);
    return s ? all.filter(st => st.sprintId === s.id) : [];
  };

  function sprintSummaryCards(pid, stories, currentSprint){
    const total = stories.reduce((a,s)=>a+(+s.points||0),0);
    const done = stories.filter(s=>s.status==='Done').reduce((a,s)=>a+(+s.points||0),0);
    const blocked = stories.filter(s=>s.blocked).length;
    const remaining = Math.max(0,total-done);
    const burnRisk = currentSprint ? Math.round(sprintMetrics(pid,currentSprint.id).burnRisk) : (total ? Math.round((remaining/Math.max(1,total))*100 + blocked*12) : 0);
    return `<div class="grid kpi" style="margin-bottom:14px">
      <div class="card kpiCard"><div class="kpiLabel">Visible Stories</div><div class="kpiValue">${stories.length}</div><div class="kpiSub">Current sprint filter</div></div>
      <div class="card kpiCard"><div class="kpiLabel">Story Points</div><div class="kpiValue">${total}</div><div class="kpiSub">Filtered scope</div></div>
      <div class="card kpiCard"><div class="kpiLabel">Done Points</div><div class="kpiValue">${done}</div><div class="kpiSub">Completed in selection</div></div>
      <div class="card kpiCard"><div class="kpiLabel">Remaining</div><div class="kpiValue">${remaining}</div><div class="kpiSub">Points still open</div></div>
      <div class="card kpiCard"><div class="kpiLabel">Blocked</div><div class="kpiValue">${blocked}</div><div class="kpiSub">Needs PM action</div></div>
      <div class="card kpiCard"><div class="kpiLabel">Burn Risk</div><div class="kpiValue">${burnRisk}%</div><div class="kpiSub">Local sprint signal</div></div>
    </div>`;
  }

  function renderSprintOptions(pid){
    const sprints = projectSprints(pid);
    const mode = normalizeSprintSelection(pid);
    return `<option value="active" ${mode==='active'?'selected':''}>Active sprint</option>
      <option value="backlog" ${mode==='backlog'?'selected':''}>Backlog only</option>
      <option value="all" ${mode==='all'?'selected':''}>All stories</option>
      ${sprints.map(s=>`<option value="${s.id}" ${mode===s.id?'selected':''}>${esc(s.name)} · ${esc(s.status||'')}</option>`).join('')}`;
  }

  window.renderScrumView = function(p){
    if(!canScrum(p)) return notApplicable('Sprint Board is only used for Agile Scrum / Time & Material and Hybrid projects.','Use Fixed Plan / Gantt for this fixed-bid project.');
    normalizeSprintSelection(p.id);
    const currentSprint = selectedSprintForProject(p.id);
    const label = sprintFilterLabel(p.id);
    const stories = storiesForSprintSelection(p.id);
    const allStories = projectStories(p.id);
    const filterMode = sprintMode();
    return `<div class="stickyActions"><div class="btnRow">
      <button class="btn primary" onclick="openStoryModal()">+ Add User Story</button>
      <button class="btn" onclick="openSprintModal()">+ Create Sprint</button>
      <select class="select" style="width:300px" data-tip="Choose Active sprint, Backlog, All stories, or a specific sprint. The board, cards, counts and burndown will refresh for this selection." onchange="state.selectedSprint=this.value;render()">${renderSprintOptions(p.id)}</select>
      ${currentSprint?`<button class="btn" onclick="openSprintModal('${currentSprint.id}')">Edit Selected Sprint</button>`:''}
      <button class="btn" onclick="printProjectChartsPDF()">Download Sprint Charts PDF</button>
    </div></div>
    <div class="callout" style="margin-bottom:16px"><div class="calloutIcon">▥</div><div><b>${esc(label.title)}</b><div class="hint">${esc(label.subtitle)} ${filterMode==='all'?`Total project stories: ${allStories.length}.`:''}</div></div></div>
    ${sprintSummaryCards(p.id, stories, currentSprint)}
    <div class="grid two" style="margin-bottom:16px">
      <div class="card"><div class="cardTitle"><h3>${filterMode==='all'?'All Stories Summary':'Sprint Burndown'}</h3><span class="eyebrow">${filterMode==='backlog'?'Backlog view':'Ideal vs current'}</span></div><div id="chartBurndown" class="chartBox"></div></div>
      <div class="card"><div class="cardTitle"><h3>Velocity</h3><span class="eyebrow">Completed story points by sprint</span></div><div id="chartVelocity" class="chartBox"></div></div>
    </div>
    ${stories.length?`<div class="kanban">${STORY_STATUSES.map(col=>`<div class="kanbanCol" ondragover="event.preventDefault()" ondrop="dropStory(event,'${col}')"><div class="kanbanHead"><h4>${col}</h4><span class="badge bGray">${stories.filter(s=>s.status===col).length}</span></div>${stories.filter(s=>s.status===col).map(renderStoryCard).join('')}</div>`).join('')}</div>`:`<div class="empty"><div class="emptyIcon">▥</div><h3>No stories in this selection</h3><p>${filterMode==='backlog'?'The backlog is empty. Add a story or move a sprint story back to backlog.':filterMode==='all'?'No user stories exist for this project yet.':'This sprint has no assigned stories yet. Add a story or edit an existing story and select this sprint.'}</p><button class="btn primary" onclick="openStoryModal()">Add User Story</button></div>`}`;
  };

  window.openProject = openProject = function(id,preferred){
    state.projectId = id;
    state.selectedSprint = 'active';
    state.view = preferred || 'cockpit';
    render();
  };

  window.selectProjectFromTop = selectProjectFromTop = function(pid){
    if(!pid){ state.projectId=null; state.view='summary'; state.selectedSprint='active'; render(); return; }
    state.projectId = pid;
    state.selectedSprint = 'active';
    if(['summary','register','masters','help','appendix','whitepaper'].includes(state.view)) state.view='cockpit';
    render();
  };

  window.openStoryModal = openStoryModal = function(sid){
    const p=getP(); if(!p) return;
    const current = selectedSprintForProject(p.id);
    const defaultSprintId = (!sid && sprintMode()!=='backlog' && sprintMode()!=='all' && current) ? current.id : '';
    const s=sid?db.stories.find(x=>x.id===sid):{projectId:p.id,title:'',epic:'',points:3,status:defaultSprintId?'To Do':'Backlog',priority:'Medium',assignee:'',sprintId:defaultSprintId,blocked:false,linkedTaskId:''};
    state.editing=sid||null;
    const tasks=projectTasks(p.id).filter(t=>t.type!=='Summary');
    openModal(sid?'Edit User Story':'Add User Story',`<div class="field"><label>User Story / Card Title</label><input class="input" id="storyTitle" value="${esc(s.title)}" placeholder="As a user I want..."></div><div class="formGrid three" style="margin-top:12px"><div class="field"><label>Epic / Feature</label><input class="input" id="storyEpic" value="${esc(s.epic)}"></div><div class="field"><label>Story Points</label><input class="input" type="number" id="storyPts" value="${+s.points||0}"></div><div class="field"><label>Status</label><select class="select" id="storyStatus">${STORY_STATUSES.map(x=>`<option ${s.status===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Sprint</label><select class="select" id="storySprint"><option value="">Backlog / No sprint</option>${projectSprints(p.id).map(sp=>`<option value="${sp.id}" ${s.sprintId===sp.id?'selected':''}>${esc(sp.name)} · ${esc(sp.status||'')}</option>`).join('')}</select></div><div class="field"><label>Assignee</label><select class="select" id="storyAssignee"><option value="">Unassigned</option>${db.resources.map(r=>`<option value="${r.id}" ${s.assignee===r.id?'selected':''}>${esc(r.name)} - ${esc(r.designation)}</option>`).join('')}</select></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Priority</label><select class="select" id="storyPriority">${['Critical','High','Medium','Low'].map(x=>`<option ${s.priority===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>${p.mode===MODE_HYBRID?'Link to WBS Deliverable':'Link to task (optional)'}</label><select class="select" id="storyTask"><option value="">No link</option>${tasks.map(t=>`<option value="${t.id}" ${s.linkedTaskId===t.id?'selected':''}>${esc(t.wbs)} - ${esc(t.name)}</option>`).join('')}</select></div></div><div class="field" style="margin-top:12px"><label><input type="checkbox" id="storyBlocked" ${s.blocked?'checked':''}> Blocked</label></div><div class="callout" style="margin-top:14px"><div class="calloutIcon">▥</div><div class="hint"><b>Tip:</b> When you add a story from a selected sprint, that sprint is preselected. Choose Backlog / No sprint if the story is not ready for sprint planning.</div></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveStoryModal()">Save Story</button>`);
  };

  window.dropStory = dropStory = function(e,status){
    const sid=e.dataTransfer.getData('text/plain');
    const s=db.stories.find(x=>x.id===sid);
    if(s){
      s.status=status;
      const current=selectedSprintForProject(s.projectId);
      if(current && sprintMode()!=='all' && sprintMode()!=='backlog' && !s.sprintId) s.sprintId=current.id;
      saveDB();toast('Story moved to '+status,'ok');render();
    }
  };

  function renderSprintFilterChart(p){
    const el=document.getElementById('chartBurndown'); if(!el) return;
    const mode = normalizeSprintSelection(p.id);
    if(mode==='all'){
      const stories=projectStories(p.id);
      drawStacked('chartBurndown','All Stories Workflow',['Backlog','To Do','In Progress','In Review','Done'],[{name:'Stories',color:cssVar('--primary'),data:STORY_STATUSES.map(st=>stories.filter(s=>s.status===st).length)},{name:'Points',color:cssVar('--accent'),data:STORY_STATUSES.map(st=>stories.filter(s=>s.status===st).reduce((a,s)=>a+(+s.points||0),0))}]);
      return;
    }
    if(mode==='backlog'){
      const stories=projectStories(p.id).filter(s=>!s.sprintId);
      if(!stories.length){el.innerHTML='<div class="empty"><h3>No backlog stories</h3><p>Backlog is empty for this project.</p></div>';return;}
      const epics=[...new Set(stories.map(s=>s.epic||'General'))];
      drawHorizontalBar('chartBurndown','Backlog Points by Epic',epics,epics.map(ep=>stories.filter(s=>(s.epic||'General')===ep).reduce((a,s)=>a+(+s.points||0),0)),'Story points');
      return;
    }
    const sprint=selectedSprintForProject(p.id);
    if(sprint) drawBurndown('chartBurndown',p,sprint);
    else el.innerHTML='<div class="empty"><h3>No sprint selected</h3><p>Create a sprint or choose All stories.</p></div>';
  }

  const previousDrawChartsForView = drawChartsForView;
  window.drawChartsForView = drawChartsForView = function(){
    previousDrawChartsForView();
    if(state.view==='scrum'){
      const p=getP(); if(!p) return;
      renderSprintFilterChart(p);
      if(document.getElementById('chartVelocity')) drawVelocity('chartVelocity',p);
    }
  };

  window.afterRender = afterRender = function(){
    if(state.view==='gantt') drawGantt();
    drawChartsForView();
  };

  function ensureSprintSampleVariety(){
    try{
      if(db.__sprintFilterPatchApplied) return;
      const sample=db.projects.find(p=>p.name==='Customer Mobile App');
      if(!sample){db.__sprintFilterPatchApplied=true;saveDB();return;}
      const sprints=projectSprints(sample.id);
      const planned=sprints.find(s=>/Sprint 13/i.test(s.name)) || sprints.find(s=>s.status==='Planned');
      if(planned && !db.stories.some(st=>st.projectId===sample.id && st.sprintId===planned.id)){
        const team=projectResources(sample.id);
        db.stories.push(
          {id:id('story'),projectId:sample.id,sprintId:planned.id,epic:'Payments',title:'As a customer I can validate card payment before order confirmation',points:8,status:'To Do',priority:'High',assignee:team[1]?.id||team[0]?.id||'',linkedTaskId:'',blocked:false},
          {id:id('story'),projectId:sample.id,sprintId:planned.id,epic:'Notifications',title:'As a customer I receive order status notifications',points:5,status:'Backlog',priority:'Medium',assignee:team[2]?.id||team[0]?.id||'',linkedTaskId:'',blocked:false}
        );
      }
      db.__sprintFilterPatchApplied=true;saveDB();
    }catch(e){console.warn('Sprint sample variety patch skipped',e)}
  }
  ensureSprintSampleVariety();

  render();
})();
</script>

<script>
(function(){
  const REPORT_CHARTS_V12=[['chartProjectGauge','work-completion-gauge'],['chartProjectHealth','delivery-health-trend'],['chartPMBOKRadar','pmbok-radar'],['chartCostCurveProject','cost-curve'],['chartBudget2','budget-category'],['chartBudgetWaterfallProject','budget-waterfall'],['chartWorkStatus','work-status'],['chartFlowStack','workflow-stack'],['chartResource','team-capacity'],['chartResourceTreemapProject','team-cost-treemap'],['chartTeamBubble','team-load-bubble'],['chartRiskBars','risk-score-bars'],['chartRiskHeatmapProject','risk-heatmap'],['chartRiskBubbleProject','risk-bubble'],['chartIssueAging','issue-aging'],['chartQualityTrend','quality-trend'],['chartFloat','critical-path-float'],['chartTaskDurationLollipop','task-duration'],['chartDependencyNetwork','dependency-network'],['chartMilestoneTimeline','milestone-timeline'],['chartSprintBurndownReport','sprint-burndown'],['chartSprintBurnupReport','sprint-burnup'],['chartVelocityReport','velocity'],['chartCumulativeFlowReport','cumulative-flow'],['chartGovernanceCompliance','governance-compliance'],['chartProgressRadar','project-control-radar']];
  window.REPORT_CHARTS_V12=REPORT_CHARTS_V12;
  function safeNameV12(s){return String(s||'chart').replace(/[^a-z0-9]+/gi,'_').replace(/^_+|_+$/g,'').slice(0,80)||'chart'}
  function shortDateV12(d){if(!d)return '-';const dt=new Date(String(d)+'T00:00:00');return isNaN(dt)?'-':dt.toLocaleDateString(undefined,{month:'short',day:'2-digit'}).replace(',','')}
  function chartCardV12(id,title,wide){return `<div class="card reportChartCard ${wide?'wide':''}"><div class="cardTitle"><h3>${esc(title)}</h3><div class="chartActions"><button class="btn sm" onclick="downloadChartPng('${id}','${safeNameV12(title)}')">PNG</button><button class="btn sm" onclick="downloadChartSvg('${id}','${safeNameV12(title)}')">SVG</button></div></div><div id="${id}" class="chartBox"></div></div>`}
  window.svgWrap=svgWrap=function(inner,w=560,h=260){return `<svg class="chartSvg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" role="img">${inner}</svg>`};

  /* Selecting a project from top dropdown now always opens the selected project cockpit. */
  window.selectProjectFromTop=selectProjectFromTop=function(pid){
    if(!pid){state.projectId=null;state.selectedSprint='active';state.view='summary';render();return;}
    state.projectId=pid;state.selectedSprint='active';state.view='cockpit';render();
    setTimeout(()=>document.getElementById('content')?.scrollTo?.({top:0,behavior:'smooth'}),0);
  };
  window.openProject=openProject=function(id,preferred){state.projectId=id;state.selectedSprint='active';state.view=preferred||'cockpit';render();};

  /* Progress is work completion; health is delivery confidence. If all project work is 100%, reports should reflect completion clearly. */
  window.projectMetrics=projectMetrics=function(p){
    scheduleProject(p.id,false);
    const tasks=projectTasks(p.id).filter(t=>t.type!=='Summary'),stories=projectStories(p.id),budgets=projectBudgets(p.id),risks=projectRisks(p.id);
    const progressTasks=tasks.length?tasks.reduce((s,t)=>s+(+t.percent||0),0)/tasks.length:0;
    const storyPts=stories.reduce((s,x)=>s+(+x.points||0),0),donePts=stories.filter(s=>s.status==='Done').reduce((a,s)=>a+(+s.points||0),0);
    const progressStories=storyPts?donePts/storyPts*100:(canScrum(p)&&!tasks.length?0:100);
    let progress=canGantt(p)&&canScrum(p)?(progressTasks+progressStories)/2:canGantt(p)?progressTasks:progressStories;
    if(!canScrum(p)&&!tasks.length)progress=0;
    const planned=budgets.reduce((a,b)=>a+(+b.planned||0),0)||(+p.budget||0),actual=budgets.reduce((a,b)=>a+(+b.actual||0),0),forecast=budgets.reduce((a,b)=>a+(+b.forecast||0),0)||planned;
    const elapsed=p.startDate&&p.endDate?clamp((toDay(today())-toDay(p.startDate)+1)/durDays(p.startDate,p.endDate),0,1):0;
    const pv=planned*elapsed,ev=planned*(progress/100),spi=pv?ev/pv:1,cpi=actual?ev/actual:1;
    const openRisks=risks.filter(r=>r.status!=='Closed'&&r.status!=='Mitigated'),critical=tasks.filter(t=>t.critical),overdue=tasks.filter(t=>t.finishDate<today()&&(+t.percent||0)<100);
    let health=100;
    if(progress>=99.5) health=100;
    else{
      health-=Math.max(0,(1-spi))*26;health-=Math.max(0,(1-cpi))*24;health-=Math.max(0,(forecast-planned)/Math.max(1,planned))*18;
      health-=openRisks.filter(r=>(+r.prob||0)*(+r.impact||0)>=12).length*6;health-=overdue.length*7;
      if(canScrum(p)){const s=activeSprint(p.id);if(s)health-=Math.max(0,sprintMetrics(p.id,s.id).burnRisk-55)*.16;}
      health=clamp(Math.round(health),0,100);
    }
    return {progress,planned,actual,forecast,pv,ev,spi,cpi,openRisks,critical,overdue,health,storyPts,donePts};
  };

  /* Gantt layout: fixed task table + timeline, same row/header heights, export buttons. */
  window.renderGanttView=renderGanttView=function(p){
    if(!canGantt(p))return notApplicable('Fixed Plan / Gantt is only used for Fixed Bid / Waterfall and Hybrid projects.','Use the Sprint Board for this Agile Scrum project.');
    if(!state.ganttZoom)state.ganttZoom='week';scheduleProject(p.id,false);const tasks=projectTasks(p.id);
    const zoomBtn=z=>`<button class="btn ${state.ganttZoom===z?'primary':''}" onclick="state.ganttZoom='${z}';render()">${z==='day'?'Day':z==='week'?'Week':'Month'}</button>`;
    return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openTaskModal()">+ Add WBS Task</button><button class="btn" onclick="saveBaseline('${p.id}')">Save Baseline</button><button class="btn" onclick="state.showBaseline=!state.showBaseline;render()">${state.showBaseline?'Hide':'Show'} Baseline</button>${zoomBtn('day')}${zoomBtn('week')}${zoomBtn('month')}<button class="btn" onclick="downloadGanttImage()">Download Gantt PNG</button><button class="btn" onclick="printGanttPDF()">Download Gantt PDF</button></div></div><div class="callout" style="margin-bottom:12px"><div class="calloutIcon">▤</div><div><b>Automated scheduling engine enabled</b><div class="hint">Use WBS tasks, milestones, FS/SS/FF/SF dependencies, lead/lag, CPM float and baseline comparison. Dates may move later when dependency rules require it.</div></div></div><div class="ganttLegend"><span class="legendKey"><span class="legendSwatch" style="background:var(--primary)"></span>Live task</span><span class="legendKey"><span class="legendSwatch" style="background:var(--danger)"></span>Critical path</span><span class="legendKey"><span class="legendSwatch" style="background:var(--accent);opacity:.45"></span>Baseline</span><span class="legendKey"><span class="legendLine"></span>Dependency</span><span class="legendKey">Double-click row or bar to edit</span></div>${tasks.length?`<div class="ganttShell ganttFixed" id="ganttShell"><div class="ganttTable" id="ganttTablePane"><div class="wbsCell header"><span>WBS</span><span>Task</span><span>Dur</span><span>Start</span><span>Finish</span><span>%</span><span>Float</span><span>Edit</span></div><div id="ganttLeftRows">${tasks.map(t=>renderWbsRow(t)).join('')}</div></div><div class="ganttTimeline" id="ganttTimelinePane"><div class="ganttHeader" id="ganttHeader"></div><div id="ganttSvgHost"></div></div></div>`:`<div class="empty"><div class="emptyIcon">▤</div><h3>No WBS tasks yet</h3><p>Create summary tasks, tasks, milestones, depen   window.syncTaskDateFields=function(src){
    const s=document.getElementById('taskStart'),f=document.getElementById('taskFinish'),d=document.getElementById('taskDur'),typ=document.getElementById('taskType');
    if(!s||!f||!d)return;let st=s.value,fi=f.value,dur=Math.max(1,+d.value||1);
    if(typ&&typ.value==='Milestone'){if(st)f.value=st;d.value=1;return;}
    if(src==='dates'&&st&&fi){if(toDay(fi)<toDay(st)){fi=st;f.value=fi;}d.value=durDays(st,fi);return;}

    if(document.getElementById('chartProjectHealth'))drawArea('chartProjectHealth','Delivery Health Trend',['W-5','W-4','W-3','W-2','W-1','Now'],confidenceTrend(m.health),'Health %',100);
    if(document.getElementById('chartPMBOKRadar'))drawRadar('chartPMBOKRadar','PMBOK Performance Domains',['Scope','Schedule','Cost','Quality','Resources','Risk','Governance'],[m.progress,clamp(m.spi*100,0,100),clamp(m.cpi*100,0,100),qualityScoreV12(p),team.length?80:45,clamp(100-risks.filter(r=>r.status!=='Closed').length*10,0,100),governanceScoreV12(p)].map(x=>Math.round(x)),100);
    if(document.getElementById('chartCostCurveProject')){const c=projectCostCurve(p,m);drawMultiLine('chartCostCurveProject','Cost Curve: Planned vs Actual vs Forecast',c.labels,c.series);}
    if(document.getElementById('chartBudget2'))drawBudget('chartBudget2',p);
    if(document.getElementById('chartBudgetWaterfallProject'))drawWaterfall('chartBudgetWaterfallProject','Budget Waterfall',[{label:'Planned',value:m.planned,absolute:true},{label:'Actual used',value:-m.actual},{label:'Forecast left',value:m.forecast-m.actual},{label:'Variance',value:m.planned-m.forecast}]);
    const status=countBy([...tasks.map(t=>({s:t.percent>=100?'Done':t.percent>0?'In Progress':'Not Started'})),...stories.map(s=>({s:s.status}))],x=>x.s);
    if(document.getElementById('chartWorkStatus'))drawDonut('chartWorkStatus','Work Status',status);
    if(document.getElementById('chartFlowStack')){const data=projectStackData(p);drawStacked('chartFlowStack','Fixed vs Agile Work Flow',data.labels,data.series);}
    if(document.getElementById('chartResource'))drawHorizontalBar('chartResource','Team Capacity',team.map(r=>r.name),team.map(r=>r.capacity||0),'Capacity %');
    if(document.getElementById('chartResourceTreemapProject'))drawTreemap('chartResourceTreemapProject','Team Cost Treemap',team.map((r,i)=>({label:r.name,value:+r.rate||1,color:COLORS[i%COLORS.length],tip:`${r.name} daily rate ${fmt(r.rate||0)} capacity ${r.capacity||0}%`})));
    if(document.getElementById('chartTeamBubble'))drawBubble('chartTeamBubble','Team Utilization vs Cost',team.map((r,i)=>({label:r.name,x:resourceLoad(r.id),y:+r.rate||0,r:8+(String(r.skills||'').split(',').filter(Boolean).length*2),color:COLORS[i%COLORS.length],tip:`${r.name} Utilization ${resourceLoad(r.id)}% Rate ${fmt(r.rate||0)}`})),{xLabel:'Utilization %',yLabel:'Daily rate'});
    if(document.getElementById('chartRiskBars'))drawBar('chartRiskBars','Risk Scores',risks.map(r=>r.category||r.title),risks.map(r=>(+r.prob||0)*(+r.impact||0)),'Risk score');
    if(document.getElementById('chartRiskHeatmapProject'))drawRiskHeatmap('chartRiskHeatmapProject','Project Risk Heatmap',risks);
    if(document.getElementById('chartRiskBubbleProject'))drawBubble('chartRiskBubbleProject','Risk Probability x Impact Bubble',risks.map((r,i)=>({label:r.category||r.title,x:+r.prob||0,y:+r.impact||0,r:7+(+r.prob||0)*(+r.impact||0)/1.5,color:(+r.prob||0)*(+r.impact||0)>=15?cssVar('--danger'):(+r.prob||0)*(+r.impact||0)>=8?cssVar('--warn'):cssVar('--accent'),tip:`${r.title} P${r.prob} I${r.impact} score ${(+r.prob||0)*(+r.impact||0)}`})),{xLabel:'Probability',yLabel:'Impact'});
    if(document.getElementById('chartIssueAging'))drawHorizontalBar('chartIssueAging','Risk / Issue Aging',risks.map(r=>r.title||r.category),risks.map(r=>r.dueDate?Math.max(0,toDay(today())-toDay(r.dueDate)):0),'Days past due');
    if(document.getElementById('chartQualityTrend'))drawArea('chartQualityTrend','Quality and Completion Trend',['Start','Plan','Build','Test','Now'],[55,64,72,qualityScoreV12(p)-5,qualityScoreV12(p)].map(x=>clamp(x,0,100)),'Quality %',100);
    if(document.getElementById('chartFloat'))drawBar('chartFloat','Critical Path Float',tasks.map(t=>t.wbs),tasks.map(t=>t.float||0),'Float days');
    if(document.getElementById('chartTaskDurationLollipop'))drawLollipop('chartTaskDurationLollipop','Task Duration Lollipop',tasks.slice(0,14).map(t=>t.wbs),tasks.slice(0,14).map(t=>t.duration||durDays(t.startDate,t.finishDate)),'Duration days');
    if(document.getElementById('chartDependencyNetwork'))drawDependencyNetworkV12('chartDependencyNetwork',p);
    if(document.getElementById('chartMilestoneTimeline'))drawTimeline('chartMilestoneTimeline','Milestone / Critical Finish Timeline',tasks.filter(t=>t.type==='Milestone'||t.critical).map(t=>({label:t.wbs+' '+t.name,date:t.finishDate,color:t.critical?cssVar('--danger'):cssVar('--primary'),tip:`${t.wbs} ${t.name} ${t.critical?'critical path':'milestone'}`})));
    const sp=selectedSprintForProject(p.id)||activeSprint(p.id);
    if(document.getElementById('chartSprintBurndownReport')){if(sp)drawBurndown('chartSprintBurndownReport',p,sp);else document.getElementById('chartSprintBurndownReport').innerHTML='<div class="empty"><h3>No sprint selected</h3></div>';}
    if(document.getElementById('chartSprintBurnupReport')){if(sp)drawBurnupV12('chartSprintBurnupReport',p,sp);else document.getElementById('chartSprintBurnupReport').innerHTML='<div class="empty"><h3>No sprint selected</h3></div>';}
    if(document.getElementById('chartVelocityReport'))drawVelocity('chartVelocityReport',p);
    if(document.getElementById('chartCumulativeFlowReport'))drawCumulativeFlowV12('chartCumulativeFlowReport',p);
    if(document.getElementById('chartGovernanceCompliance'))drawComplianceV12('chartGovernanceCompliance',p);
    if(document.getElementById('chartProgressRadar'))drawRadar('chartProgressRadar','Project Control Radar',['Schedule','Cost','Scope','Risk','Team','Quality'],[clamp(m.spi*100,0,100),clamp(m.cpi*100,0,100),m.progress,clamp(100-risks.length*12,0,100),team.length?80:40,qualityScoreV12(p)].map(x=>Math.round(x)),100);
  };

  function getSvgFromHost(id){const host=document.getElementById(id);if(!host)return null;if(host.tagName&&host.tagName.toLowerCase()==='svg')return host;return host.querySelector('svg');}
  function serializeSvg(svg){const copy=svg.cloneNode(true);copy.setAttribute('xmlns','http://www.w3.org/2000/svg');const w=copy.getAttribute('width')||copy.viewBox?.baseVal?.width||900;const h=copy.getAttribute('height')||copy.viewBox?.baseVal?.height||500;copy.setAttribute('width',w);copy.setAttribute('height',h);return new XMLSerializer().serializeToString(copy);}
  window.downloadChartSvg=function(id,name){const svg=getSvgFromHost(id);if(!svg){toast('Chart is not available to download','err');return;}const blob=new Blob([serializeSvg(svg)],{type:'image/svg+xml;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=safeNameV12(name||id)+'.svg';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1200);};
  window.downloadChartPng=function(id,name){const svg=getSvgFromHost(id);if(!svg){toast('Chart is not available to download','err');return;}const raw=serializeSvg(svg);const img=new Image();const blob=new Blob([raw],{type:'image/svg+xml;charset=utf-8'});const url=URL.createObjectURL(blob);img.onload=function(){const vb=svg.viewBox&&svg.viewBox.baseVal;const width=parseInt(svg.getAttribute('width')||vb?.width||900,10),height=parseInt(svg.getAttribute('height')||vb?.height||500,10);const scale=2;const canvas=document.createElement('canvas');canvas.width=width*scale;canvas.height=height*scale;const ctx=canvas.getContext('2d');ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--panel')||'#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);canvas.toBlob(function(png){const a=document.createElement('a');a.href=URL.createObjectURL(png);a.download=safeNameV12(name||id)+'.png';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1500);},'image/png');};img.onerror=function(){URL.revokeObjectURL(url);toast('Unable to export chart image','err');};img.src=url;};
  window.downloadProjectReportImages=function(type){const charts=REPORT_CHARTS_V12.filter(([id])=>getSvgFromHost(id));if(!charts.length){toast('No charts available on this page','err');return;}charts.forEach(([id,name],i)=>setTimeout(()=>type==='svg'?downloadChartSvg(id,name):downloadChartPng(id,name),i*260));toast('Starting '+charts.length+' chart download(s). Browser may ask to allow multiple downloads.','ok');};
  window.downloadGanttImage=function(){downloadChartPng('ganttSvgHost','selected_project_gantt_chart');};

  const prevAfterRender=afterRender;
  window.afterRender=afterRender=function(){
    if(state.view==='gantt')drawGantt();
    drawChartsForView();
    if(state.view==='gantt')syncGanttScrollV12();
  };
  render();
})();
</script>
