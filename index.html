/* =========================
   V2 RESPONSIVE UI REFINEMENT
   - top project selector
   - no project list dependency in left menu
   - smaller typography
   - larger non-compressed chart panels
   ========================= */
:root{--headerH:62px;--radius:14px;--radius2:10px;--topNavH:48px}
html,body{font-size:13px}
body.compact-ui .sidebar{display:none!important}
body.compact-ui .app{display:flex;width:100vw}
body.compact-ui .main{width:100%;min-width:0}
body.compact-ui .topbar{height:auto;min-height:var(--headerH);padding:10px 18px;gap:10px;flex-wrap:wrap;align-items:center}
body.compact-ui .titleBlock{flex:1 1 230px;min-width:190px}
body.compact-ui .pageTitle{font-size:17px;line-height:1.12}
body.compact-ui .pageSub{font-size:11px;max-width:58vw}
body.compact-ui .search{width:clamp(210px,22vw,330px);flex:0 1 330px}
body.compact-ui .search input{height:36px;font-size:12px}
body.compact-ui .themeSelect{height:36px;font-size:12px;max-width:170px}
body.compact-ui .projectSelectBox{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:5px 8px 5px 12px;min-width:280px;max-width:min(38vw,460px);box-shadow:0 6px 18px rgba(0,0,0,.03)}
body.compact-ui .projectSelectBox label{font-size:9px;font-weight:950;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);white-space:nowrap}
body.compact-ui .projectSelect{border:0;outline:0;background:transparent;color:var(--text);font-weight:900;font-size:12px;min-width:0;flex:1;padding:5px 22px 5px 2px}
body.compact-ui .workspaceNav{display:flex;align-items:center;gap:8px;overflow:visible;padding:8px 18px;background:color-mix(in srgb,var(--panel) 92%,transparent);border-bottom:1px solid var(--line);backdrop-filter:blur(14px);min-height:var(--topNavH);position:relative;z-index:80;flex-wrap:wrap}
body.compact-ui .navGroup{position:relative;display:inline-flex;min-width:0}
body.compact-ui .navGroup summary{list-style:none;border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:999px;min-height:32px;padding:0 12px;display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:950;white-space:nowrap;transition:var(--tr);box-shadow:0 4px 12px rgba(0,0,0,.025);user-select:none;outline:none}
body.compact-ui .navGroup summary::-webkit-details-marker{display:none}
body.compact-ui .navGroup summary:after{content:'⌄';font-size:10px;color:var(--muted2);transition:transform .16s ease}
body.compact-ui .navGroup[open] summary:after{transform:rotate(180deg)}

function projectMetrics(p){scheduleProject(p.id,false);const tasks=projectTasks(p.id).filter(t=>t.type!=='Summary');const stories=projectStories(p.id);const budgets=projectBudgets(p.id);const risks=projectRisks(p.id);const progressTasks=tasks.length?tasks.reduce((s,t)=>s+(+t.percent||0),0)/tasks.length:0;const storyPts=stories.reduce((s,x)=>s+(+x.points||0),0);const donePts=stories.filter(s=>s.status==='Done').reduce((a,s)=>a+(+s.points||0),0);const progressStories=storyPts?donePts/storyPts*100:0;let progress=canGantt(p)&&canScrum(p)?(progressTasks+progressStories)/2:canGantt(p)?progressTasks:progressStories;const planned=budgets.reduce((a,b)=>a+(+b.planned||0),0)||(+p.budget||0);const actual=budgets.reduce((a,b)=>a+(+b.actual||0),0);const forecast=budgets.reduce((a,b)=>a+(+b.forecast||0),0)||planned;const elapsed=p.startDate&&p.endDate?clamp((toDay(today())-toDay(p.startDate)+1)/durDays(p.startDate,p.endDate),0,1):0;const pv=planned*elapsed;const ev=planned*(progress/100);const spi=pv?ev/pv:1;const cpi=actual?ev/actual:1;const openRisks=risks.filter(r=>r.status!=='Closed'&&r.status!=='Mitigated');const critical=tasks.filter(t=>t.critical);const overdue=tasks.filter(t=>t.finishDate<today()&&(+t.percent||0)<100);let health=100;health-=Math.max(0,(1-spi))*35;health-=Math.max(0,(1-cpi))*35;health-=openRisks.filter(r=>r.prob*r.impact>=12).length*8;health-=overdue.length*7;health=clamp(Math.round(health),0,100);return {progress,planned,actual,forecast,pv,ev,spi,cpi,openRisks,critical,overdue,health,storyPts,donePts}}

>SPI</th><th>CPI</th><th></th></tr></thead><tbody>${projs.map((p,i)=>{const m=metrics[i];return `<tr><td><b>${esc(p.name)}</b><div class="hint">${esc(p.client||'')}</div></td><td>${modeBadge(p.mode)}</td><td>${statusBadge(p.status)}</td><td><span class="badge ${m.health>=80?'bGreen':m.health>=60?'bWarn':'bRed'}">${m.health}%</span></td><td class="mono">${money(m.planned,p.currency)}</td><td><div style="width:120px">${pctBar(m.progress)}</div></td><td class="mono">${m.spi.toFixed(2)}</td><td class="mono">${m.cpi.toFixed(2)}</td><td><button class="btn sm primary" onclick="openProject('${p.id}')">Open</button></td></tr>`}).join('')}</tbody></table></div></div><div class="card"><div class="cardTitle"><h3>Portfolio Charts</h3><button class="btn sm" onclick="printAllProjectCharts()">PDF</button></div><div id="summaryCharts" class="grid" style="gap:12px"><div id="chartMode" class="chartBox"></div><div id="chartHealth" class="chartBox"></div></div></div></div>`;return html}

-top:16px"><div class="card"><div class="cardTitle"><h3>Project Charter</h3>${modeBadge(p.mode)}</div><div class="grid two"><div>${info('Project',p.name)}${info('Client',p.client)}${info('Pricing Model',p.pricingModel)}${info('Status',p.status)}${info('Dates',`${niceDate(p.startDate)} → ${niceDate(p.endDate)}`)}</div><div>${info('Budget',money(p.budget,p.currency))}${info('Currency',p.currency)}${info('Location',p.location)}${info('Priority',p.priority)}${info('Description',p.description)}</div></div></div><div class="card"><div class="cardTitle"><h3>Recommended Next Action</h3><span class="eyebrow">Smart PM assistant</span></div>${renderRecommendationList(p,m)}</div></div>`}

function renderRecommendationList(p,m){const rec=[];if(canGantt(p)&&m.critical.length)rec.push(`Review ${m.critical.length} critical-path task(s); zero float means any delay directly affects finish date.`);if(m.spi<.95)rec.push('Schedule performance is below threshold; inspect dependency chain and consider fast tracking or scope trade-offs.');if(m.cpi<.95||m.forecast>m.planned)rec.push('Cost trend indicates possible overrun; review resource, license, and cloud categories.');if(canScrum(p)){const s=activeSprint(p.id);if(s){const sp=sprintMetrics(p.id,s.id);if(sp.burnRisk>50)rec.push('Current sprint has elevated burn risk; reduce WIP and unblock high-point stories.')}}if(m.openRisks.filter(r=>r.prob*r.impact>=12).length)rec.push('High risks exist; assign owners and dated mitigation actions.');if(!rec.length)rec.push('Project looks controlled. Continue baseline review, sprint inspection, and risk monitoring.');return `<ul class="hint" style="margin:0;padding-left:18px">${rec.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`}
// Scheduling Engine
function scheduleProject(pid, persist=true){
 const tasks=projectTasks(pid); if(!tasks.length)return;
 tasks.forEach((t,i)=>{t.seq=i+1;t.level=calcLevel(t.wbs);t.duration=Math.max(t.type==='Milestone'?1:1,+t.duration||durDays(t.startDate,t.finishDate)||1);if(!t.startDate)t.startDate=fromDay(Math.min(...tasks.filter(x=>x.startDate).map(x=>toDay(x.startDate)).concat([toDay(today())])));if(!t.finishDate)t.finishDate=dateAdd(t.startDate,t.duration-1);t.deps=parseDeps(t.depText,tasks);t.critical=false;t.float=0});
 const map=Object.fromEntries(tasks.map(t=>[t.id,t]));
 const nonSummary=tasks.filter(t=>t.type!=='Summary');
 const visited=new Set(),temp=new Set(),ordered=[];
 function visit(t){if(visited.has(t.id))return;if(temp.has(t.id)){t.cycle=true;return}temp.add(t.id);(t.deps||[]).forEach(d=>{if(map[d.predId])visit(map[d.predId])});temp.delete(t.id);visited.add(t.id);ordered.push(t)}
 nonSummary.forEach(visit);
 ordered.forEach(t=>{let es=toDay(t.startDate);(t.deps||[]).forEach(d=>{const p=map[d.predId];if(!p||p.type==='Summary')return;const ps=toDay(p.startDate),pf=toDay(p.finishDate),dur=t.duration;let cand=es;if(d.type==='FS')cand=pf+1+d.lag;if(d.type==='SS')cand=ps+d.lag;if(d.type==='FF')cand=pf+d.lag-dur+1;if(d.type==='SF')cand=ps+d.lag-dur+1;es=Math.max(es,cand)});t.startDate=fromDay(es);t.finishDate=fromDay(es+t.duration-1)});
 // Summary rollup by WBS children
 tasks.filter(t=>t.type==='Summary').sort((a,b)=>splitWbs(b.wbs).length-splitWbs(a.wbs).length).forEach(s=>{const kids=tasks.filter(k=>k.id!==s.id&&String(k.wbs).startsWith(String(s.wbs)+'.')&&k.type!=='Summary');if(kids.length){s.startDate=fromDay(Math.min(...kids.map(k=>toDay(k.startDate))));s.finishDate=fromDay(Math.max(...kids.map(k=>toDay(k.finishDate))));s.duration=durDays(s.startDate,s.finishDate);s.percent=Math.round(kids.reduce((a,k)=>a+(+k.percent||0),0)/kids.length)}});
 // CPM backward pass for non-summary tasks
 const projectFinish=Math.max(...nonSummary.map(t=>toDay(t.finishDate)));nonSummary.forEach(t=>{t.es=toDay(t.startDate);t.ef=toDay(t.finishDate);t.ls=projectFinish-t.duration+1;t.lf=projectFinish});
 const successors={};nonSummary.forEach(t=>(t.deps||[]).forEach(d=>{if(!successors[d.predId])successors[d.predId]=[];successors[d.predId].push({succ:t,type:d.type,lag:d.lag})}));
 ordered.slice().reverse().forEach(t=>{const succs=successors[t.id]||[];if(succs.length){let bestLf=Infinity,bestLs=Infinity;succs.forEach(edge=>{const s=edge.succ;let pLf=Infinity,pLs=Infinity;if(edge.type==='FS'){pLf=s.ls-1-edge.lag;pLs=pLf-t.duration+1}else if(edge.type==='SS'){pLs=s.ls-edge.lag;pLf=pLs+t.duration-1}else if(edge.type==='FF'){pLf=s.lf-edge.lag;pLs=pLf-t.duration+1}else if(edge.type==='SF'){pLs=s.lf-edge.lag;pLf=pLs+t.duration-1}bestLf=Math.min(bestLf,pLf);bestLs=Math.min(bestLs,pLs)});if(isFinite(bestLf)){t.lf=bestLf;t.ls=bestLs}}t.float=Math.max(0,t.ls-t.es);t.critical=t.float<=0});
 tasks.filter(t=>t.type==='Summary').forEach(s=>{const kids=tasks.filter(k=>k.id!==s.id&&String(k.wbs).startsWith(String(s.wbs)+'.')&&k.type!=='Summary');s.float=kids.length?Math.min(...kids.map(k=>k.float||0)):0;s.critical=kids.length&&kids.every(k=>k.critical)});
 if(persist)saveDB();
}
function renderGanttView(p){if(!canGantt(p))return notApplicable('Fixed Plan / Gantt is only used for Fixed Bid / Waterfall and Hybrid projects.', 'Use the Sprint Board for this Agile Scrum project.');scheduleProject(p.id,false);const tasks=projectTasks(p.id);return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openTaskModal()">+ Add WBS Task</button><button class="btn" onclick="saveBaseline('${p.id}')">Save Baseline</button><button class="btn" onclick="state.showBaseline=!state.showBaseline;render()">${state.showBaseline?'Hide':'Show'} Baseline</button><button class="btn" onclick="state.ganttZoom='day';render()">Day</button><button class="btn" onclick="state.ganttZoom='week';render()">Week</button><button class="btn" onclick="state.ganttZoom='month';render()">Month</button><button class="btn" onclick="printGanttPDF()">Download Gantt PDF</button></div></div><div class="callout" style="margin-bottom:16px"><div class="calloutIcon">▤</div><div><b>Automated scheduling engine enabled</b><div class="hint">Dependencies support FS, SS, FF and SF with lead/lag. Edit a predecessor date or duration and downstream tasks recalculate automatically. Critical path tasks are red. Baseline bars appear under live bars.</div></div></div>${tasks.length?`<div class="ganttShell"><div class="ganttTable"><div class="wbsCell header"><span>WBS</span><span>Task</span><span>Dur</span><span>Start</span><span>Finish</span><span>%</span><span>Float</span></div><div id="ganttLeftRows">${tasks.map(t=>renderWbsRow(t)).join('')}</div></div><div class="ganttTimeline"><div class="ganttHeader" id="ganttHeader"></div><div id="ganttSvgHost"></div></div></div>`:`<div class="empty"><div class="emptyIcon">▤</div><h3>No WBS tasks yet</h3><p>Create summary tasks, tasks, milestones, dependencies and baseline dates for this project.</p><button class="btn primary" onclick="openTaskModal()">Create first task</button></div>`}`}

function drawGantt(){const p=getP();if(!p||!canGantt(p))return;const tasks=projectTasks(p.id);if(!tasks.length)return;scheduleProject(p.id,false);const allDates=tasks.flatMap(t=>[t.startDate,t.finishDate,t.baselineStart,t.baselineFinish].filter(Boolean));let min=Math.min(...allDates.map(toDay))-4,max=Math.max(...allDates.map(toDay))+8;const dayPx=state.ganttZoom==='day'?34:state.ganttZoom==='week'?12:5,rowH=38,width=Math.max(900,(max-min+1)*dayPx),height=tasks.length*rowH;const primary=cssVar('--primary'),line=cssVar('--line2'),muted=cssVar('--muted'),text=cssVar('--text'),danger=cssVar('--danger'),panel3=cssVar('--panel3'),accent=cssVar('--accent');let head=`<svg class="ganttSvg" width="${width}" height="54" style="width:${width}px;height:54px">`;for(let d=min;d<=max;d++){const x=(d-min)*dayPx;const dt=new Date(d*MS);if(dt.getDate()===1||d===min){head+=`<line x1="${x}" y1="0" x2="${x}" y2="54" stroke="${line}"/><text x="${x+6}" y="18" fill="${muted}" font-size="11" font-weight="800">${dt.toLocaleDateString(undefined,{month:'short',year:'2-digit'})}</text>`}if(state.ganttZoom==='day'||(state.ganttZoom==='week'&&dt.getDay()===1)){head+=`<text x="${x+dayPx/2}" y="43" fill="${muted}" font-size="9" text-anchor="middle">${state.ganttZoom==='day'?dt.getDate():'W'+Math.ceil(dt.getDate()/7)}</text>`}}head+='</svg>';document.getElementById('ganttHeader').innerHTML=head;let svg=`<svg id="ganttSvg" class="ganttSvg" width="${width}" height="${height}" style="width:${width}px;height:${height}px;touch-action:none">`;
 for(let d=min;d<=max;d++){const dt=new Date(d*MS);const x=(d-min)*dayPx;if(dt.getDay()===0||dt.getDay()===6)svg+=`<rect x="${x}" y="0" width="${dayPx}" height="${height}" fill="${panel3}" opacity=".42"/>`;if(dt.getDate()===1)svg+=`<line x1="${x}" y1="0" x2="${x}" y2="${height}" stroke="${line}" stroke-width="1"/>`}for(let i=0;i<tasks.length;i++){svg+=`<line x1="0" y1="${(i+1)*rowH}" x2="${width}" y2="${(i+1)*rowH}" stroke="${cssVar('--line')}"/>`}
 const todayX=(toDay(today())-min)*dayPx;if(todayX>=0&&todayX<=width)svg+=`<line x1="${todayX}" y1="0" x2="${todayX}" y2="${height}" stroke="${danger}" stroke-width="2" stroke-dasharray="5 4"/><text x="${todayX+4}" y="12" fill="${danger}" font-size="10" font-weight="900">Today</text>`;
 const pos={};tasks.forEach((t,i)=>{const y=i*rowH+8;const s=(toDay(t.startDate)-min)*dayPx;const f=(toDay(t.finishDate)-min+1)*dayPx;const w=Math.max(8,f-s);pos[t.id]={s,f,y:y+10,mid:y+10};const fill=t.critical?danger:(t.type==='Summary'?muted:primary);if(state.showBaseline&&t.baselineStart&&t.baselineFinish){const bs=(toDay(t.baselineStart)-min)*dayPx,bf=(toDay(t.baselineFinish)-min+1)*dayPx;svg+=`<rect x="${bs}" y="${y+20}" width="${Math.max(6,bf-bs)}" height="5" rx="3" fill="${accent}" opacity=".45"/>`}if(t.type==='Milestone'){const mx=s+5,my=y+10;svg+=`<polygon data-taskid="${t.id}" class="dragbar" points="${mx},${my-8} ${mx+8},${my} ${mx},${my+8} ${mx-8},${my}" fill="${fill}" stroke="${text}" stroke-width="1"/>`}else{svg+=`<rect data-taskid="${t.id}" class="dragbar" x="${s}" y="${y}" width="${w}" height="18" rx="6" fill="${fill}" opacity="${t.type==='Summary'?'.38':'.22'}" stroke="${fill}" stroke-width="1.5"/>`;svg+=`<rect data-taskid="${t.id}" class="dragbar" x="${s}" y="${y}" width="${Math.max(2,w*(+t.percent||0)/100)}" height="18" rx="6" fill="${fill}" opacity="${t.type==='Summary'?'.68':'.88'}"/>`;if(w>72)svg+=`<text data-taskid="${t.id}" class="dragbar" x="${s+7}" y="${y+13}" fill="${t.critical?'white':text}" font-size="10" font-weight="850">${esc(t.name).slice(0,30)}</text>`}});

function attachGanttDrag(dayPx){const svg=document.getElementById('ganttSvg');if(!svg)return;let drag=null;svg.querySelectorAll('.dragbar').forEach(el=>{el.style.cursor='grab';el.addEventListener('pointerdown',e=>{const id=e.target.dataset.taskid;if(!id)return;drag={id,startX:e.clientX};svg.setPointerCapture(e.pointerId)});});svg.addEventListener('pointerup',e=>{if(!drag)return;const delta=Math.round((e.clientX-drag.startX)/dayPx);if(delta){const t=db.tasks.find(x=>x.id===drag.id);if(t&&t.type!=='Summary'){t.startDate=dateAdd(t.startDate,delta);t.finishDate=dateAdd(t.finishDate,delta);scheduleProject(t.projectId,true);toast(`Moved ${t.name} by ${delta} day(s). Downstream schedule recalculated.`,'ok');render()}}drag=null});}

function saveBaseline(pid){projectTasks(pid).forEach(t=>{t.baselineStart=t.startDate;t.baselineFinish=t.finishDate});saveDB();toast('Baseline saved from current schedule','ok');render()}
function updateTaskPercent(tid,v){const t=db.tasks.find(x=>x.id===tid);if(t){t.percent=clamp(v,0,100);saveDB();render()}}
function openTaskModal(tid){const p=getP();if(!p)return;const t=tid?db.tasks.find(x=>x.id===tid):{projectId:p.id,type:'Task',wbs:nextWbs(p.id),duration:5,startDate:p.startDate||today(),finishDate:dateAdd(p.startDate||today(),4),percent:0,depText:'',plannedCost:0,actualCost:0};state.editing=tid||null;openModal(tid?'Edit WBS Task':'Add WBS Task',`<div class="formGrid three"><div class="field"><label>WBS</label><input class="input" id="taskWbs" value="${esc(t.wbs)}"></div><div class="field"><label>Task Type</label><select class="select" id="taskType">${TASK_TYPES.map(x=>`<option ${t.type===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Duration days</label><input class="input" type="number" min="1" id="taskDur" value="${t.duration||1}"></div></div><div class="field" style="margin-top:12px"><label>Task / Deliverable Name</label><input class="input" id="taskName" value="${esc(t.name||'')}"></div><div class="formGrid three" style="margin-top:12px"><div class="field"><label>Start Date</label><input class="input" type="date" id="taskStart" value="${t.startDate||today()}"></div><div class="field"><label>Finish Date</label><input class="input" type="date" id="taskFinish" value="${t.finishDate||dateAdd(t.startDate||today(),(+t.duration||1)-1)}"></div><div class="field"><label>% Complete</label><input class="input" type="number" min="0" max="100" id="taskPct" value="${+t.percent||0}"></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Assign To</label><select class="select" id="taskAssignee"><option value="">Unassigned</option>${db.resources.map(r=>`<option value="${r.id}" ${(t.assignee||'')===r.id?'selected':''}>${esc(r.name)} - ${esc(r.designation)}</option>`).join('')}</select></div><div class="field"><label>Quick add resource name (optional)</label><input class="input" id="taskNewRes" placeholder="Type new resource name if not in master"></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Dependencies: WBS + type + lag</label><input class="input" id="taskDeps" value="${esc(t.depText||'')}" placeholder="Examples: 1.1FS+0, 2.3SS+2, 3FF-1, 4SF+0"></div><div class="field"><label>Custom Field / Notes</label><input class="input" id="taskCustom" value="${esc(t.custom||'')}" placeholder="Deliverable, phase, approval, vendor, etc."></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Planned Task Cost</label><input class="input" type="number" id="taskPlanned" value="${+t.plannedCost||0}"></div><div class="field"><label>Actual Task Cost</label><input class="input" type="number" id="taskActual" value="${+t.actualCost||0}"></div></div><div class="callout" style="margin-top:14px"><div class="calloutIcon">↔</div><div class="hint"><b>Dependency types:</b> FS = successor starts after predecessor finishes; SS = starts together; FF = finishes together; SF = successor finishes after predecessor starts. Use + for lag and - for lead.</div></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveTaskModal()">Save and Recalculate</button>`)}
function nextWbs(pid){const tasks=projectTasks(pid);if(!tasks.length)return '1';const roots=tasks.map(t=>splitWbs(t.wbs)[0]).filter(Boolean);return String(Math.max(0,...roots)+1)}
function saveTaskModal(){const p=getP();let ass=document.getElementById('taskAssignee').value;const newRes=document.getElementById('taskNewRes').value.trim();if(newRes){const rid=id('res');db.resources.push({id:rid,name:newRes,designation:'Team Member',location:p.location||'',rate:0,capacity:100,skills:''});if(!p.resourceIds)p.resourceIds=[];p.resourceIds.push(rid);ass=rid}const dur=Math.max(1,+document.getElementById('taskDur').value||1);const obj={projectId:p.id,wbs:document.getElementById('taskWbs').value.trim(),type:document.getElementById('taskType').value,name:document.getElementById('taskName').value.trim(),duration:dur,startDate:document.getElementById('taskStart').value,finishDate:document.getElementById('taskFinish').value||dateAdd(document.getElementById('taskStart').value,dur-1),percent:clamp(document.getElementById('taskPct').value,0,100),assignee:ass,depText:document.getElementById('taskDeps').value.trim(),custom:document.getElementById('taskCustom').value.trim(),plannedCost:+document.getElementById('taskPlanned').value||0,actualCost:+document.getElementById('taskActual').value||0};if(!obj.name||!obj.wbs){toast('WBS and task name are required','err');return}if(state.editing){Object.assign(db.tasks.find(t=>t.id===state.editing),obj)}else{db.tasks.push({id:id('tsk'),...obj})}scheduleProject(p.id,true);closeModal();toast('Task saved and schedule recalculated','ok');render()}
function renderScrumView(p){if(!canScrum(p))return notApplicable('Sprint Board is only used for Agile Scrum / Time & Material and Hybrid projects.','Use Fixed Plan / Gantt for this fixed-bid project.');const sprints=projectSprints(p.id),active=activeSprint(p.id)||sprints[0];const stories=projectStories(p.id).filter(s=>state.selectedSprint==='all'||!active?true:(state.selectedSprint==='backlog'?(!s.sprintId):s.sprintId===active.id));return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openStoryModal()">+ Add User Story</button><button class="btn" onclick="openSprintModal()">+ Create Sprint</button><select class="select" style="width:240px" onchange="state.selectedSprint=this.value;render()"><option value="active" ${state.selectedSprint==='active'?'selected':''}>Active sprint</option><option value="backlog" ${state.selectedSprint==='backlog'?'selected':''}>Backlog only</option><option value="all" ${state.selectedSprint==='all'?'selected':''}>All stories</option>${sprints.map(s=>`<option value="${s.id}" ${state.selectedSprint===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select><button class="btn" onclick="printProjectChartsPDF()">Download Sprint Charts PDF</button></div></div>${active?`<div class="callout" style="margin-bottom:16px"><div class="calloutIcon">▥</div><div><b>${esc(active.name)}: ${esc(active.goal||'No goal defined')}</b><div class="hint">${niceDate(active.startDate)} to ${niceDate(active.endDate)} · ${statusBadge(active.status)}</div></div></div>`:''}<div class="grid two" style="margin-bottom:16px"><div class="card"><div class="cardTitle"><h3>Sprint Burndown</h3><span class="eyebrow">Ideal vs current</span></div><div id="chartBurndown" class="chartBox"></div></div><div class="card"><div class="cardTitle"><h3>Velocity</h3><span class="eyebrow">Completed story points</span></div><div id="chartVelocity" class="chartBox"></div></div></div><div class="kanban">${STORY_STATUSES.map(col=>`<div class="kanbanCol" ondragover="event.preventDefault()" ondrop="dropStory(event,'${col}')"><div class="kanbanHead"><h4>${col}</h4><span class="badge bGray">${stories.filter(s=>s.status===col).length}</span></div>${stories.filter(s=>s.status===col).map(renderStoryCard).join('')}</div>`).join('')}</div>`}
function activeSprint(pid){return projectSprints(pid).find(s=>s.status==='Active')||null}
function renderStoryCard(s){const r=db.resources.find(x=>x.id===s.assignee);const link=s.linkedTaskId?db.tasks.find(t=>t.id===s.linkedTaskId):null;return `<div class="storyCard" draggable="true" ondragstart="event.dataTransfer.setData('text/plain','${s.id}')"><div class="storyTitle">${s.blocked?'🚫 ':''}${esc(s.title)}</div><div class="hint">${esc(s.epic||'General')} · ${r?esc(r.name):'Unassigned'}</div><div class="storyMeta"><span class="badge bBlue">${+s.points||0} pts</span><span class="badge ${s.priority==='Critical'?'bRed':s.priority==='High'?'bWarn':'bGray'}">${esc(s.priority||'Medium')}</span>${link?`<span class="badge bPurple">Linked ${esc(link.wbs)}</span>`:''}<button class="btn sm" onclick="openStoryModal('${s.id}')">Edit</button></div></div>`}
function dropStory(e,status){const sid=e.dataTransfer.getData('text/plain');const s=db.stories.find(x=>x.id===sid);if(s){s.status=status;saveDB();toast('Story moved to '+status,'ok');render()}}
function sprintMetrics(pid,sprintId){const sprint=db.sprints.find(s=>s.id===sprintId);const stories=projectStories(pid).filter(s=>s.sprintId===sprintId);const total=stories.reduce((a,s)=>a+(+s.points||0),0);const done=stories.filter(s=>s.status==='Done').reduce((a,s)=>a+(+s.points||0),0);const days=sprint?durDays(sprint.startDate,sprint.endDate):10;const elapsed=sprint?clamp(toDay(today())-toDay(sprint.startDate)+1,0,days):0;const expected=total*(elapsed/days);const burnRisk=clamp((expected-done)/Math.max(1,total)*100+stories.filter(s=>s.blocked).length*20,0,100);return {total,done,remaining:total-done,days,elapsed,burnRisk}}
function openSprintModal(sid){const p=getP();const s=sid?db.sprints.find(x=>x.id===sid):{projectId:p.id,name:'Sprint '+(projectSprints(p.id).length+1),goal:'',startDate:today(),endDate:dateAdd(today(),13),status:'Planned'};state.editing=sid||null;openModal(sid?'Edit Sprint':'Create Sprint',`<div class="formGrid"><div class="field"><label>Sprint Name</label><input class="input" id="sprName" value="${esc(s.name)}"></div><div class="field"><label>Status</label><select class="select" id="sprStatus">${['Planned','Active','Completed'].map(x=>`<option ${s.status===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Start</label><input class="input" type="date" id="sprStart" value="${s.startDate}"></div><div class="field"><label>End</label><input class="input" type="date" id="sprEnd" value="${s.endDate}"></div></div><div class="field" style="margin-top:12px"><label>Sprint Goal</label><textarea id="sprGoal">${esc(s.goal||'')}</textarea></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveSprintModal()">Save Sprint</button>`)}
function saveSprintModal(){const p=getP();const obj={projectId:p.id,name:document.getElementById('sprName').value.trim(),status:document.getElementById('sprStatus').value,startDate:document.getElementById('sprStart').value,endDate:document.getElementById('sprEnd').value,goal:document.getElementById('sprGoal').value.trim()};if(!obj.name){toast('Sprint name required','err');return}if(obj.status==='Active')db.sprints.filter(s=>s.projectId===p.id).forEach(s=>s.status='Planned');if(state.editing)Object.assign(db.sprints.find(s=>s.id===state.editing),obj);else db.sprints.push({id:id('spr'),...obj});saveDB();closeModal();render()}
function openStoryModal(sid){const p=getP();const s=sid?db.stories.find(x=>x.id===sid):{projectId:p.id,title:'',epic:'',points:3,status:'Backlog',priority:'Medium',assignee:'',sprintId:'',blocked:false,linkedTaskId:''};state.editing=sid||null;const tasks=projectTasks(p.id).filter(t=>t.type!=='Summary');openModal(sid?'Edit User Story':'Add User Story',`<div class="field"><label>User Story / Card Title</label><input class="input" id="storyTitle" value="${esc(s.title)}" placeholder="As a user I want..."></div><div class="formGrid three" style="margin-top:12px"><div class="field"><label>Epic / Feature</label><input class="input" id="storyEpic" value="${esc(s.epic)}"></div><div class="field"><label>Story Points</label><input class="input" type="number" id="storyPts" value="${+s.points||0}"></div><div class="field"><label>Status</label><select class="select" id="storyStatus">${STORY_STATUSES.map(x=>`<option ${s.status===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Sprint</label><select class="select" id="storySprint"><option value="">Backlog / No sprint</option>${projectSprints(p.id).map(sp=>`<option value="${sp.id}" ${s.sprintId===sp.id?'selected':''}>${esc(sp.name)}</option>`).join('')}</select></div><div class="field"><label>Assignee</label><select class="select" id="storyAssignee"><option value="">Unassigned</option>${db.resources.map(r=>`<option value="${r.id}" ${s.assignee===r.id?'selected':''}>${esc(r.name)} - ${esc(r.designation)}</option>`).join('')}</select></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Priority</label><select class="select" id="storyPriority">${['Critical','High','Medium','Low'].map(x=>`<option ${s.priority===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>${p.mode===MODE_HYBRID?'Link to WBS Deliverable':'Link to task (optional)'}</label><select class="select" id="storyTask"><option value="">No link</option>${tasks.map(t=>`<option value="${t.id}" ${s.linkedTaskId===t.id?'selected':''}>${esc(t.wbs)} - ${esc(t.name)}</option>`).join('')}</select></div></div><div class="field" style="margin-top:12px"><label><input type="checkbox" id="storyBlocked" ${s.blocked?'checked':''}> Blocked</label></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveStoryModal()">Save Story</button>`)}
function saveStoryModal(){const p=getP();const obj={projectId:p.id,title:document.getElementById('storyTitle').value.trim(),epic:document.getElementById('storyEpic').value.trim(),points:+document.getElementById('storyPts').value||0,status:document.getElementById('storyStatus').value,sprintId:document.getElementById('storySprint').value,assignee:document.getElementById('storyAssignee').value,priority:document.getElementById('storyPriority').value,linkedTaskId:document.getElementById('storyTask').value,blocked:document.getElementById('storyBlocked').checked};if(!obj.title){toast('Story title required','err');return}if(state.editing)Object.assign(db.stories.find(s=>s.id===state.editing),obj);else db.stories.push({id:id('story'),...obj});saveDB();closeModal();render()}
function renderHybridView(p){if(p.mode!==MODE_HYBRID)return notApplicable('Hybrid Links are only used when the project operating model is Hybrid.','For fixed-bid use Gantt; for agile use Sprint Board.');const stories=projectStories(p.id);const tasks=projectTasks(p.id).filter(t=>t.type!=='Summary');return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openStoryModal()">+ Add Linked Story</button><button class="btn" onclick="navTo('gantt')">Fixed Plan</button><button class="btn" onclick="navTo('scrum')">Sprint Board</button></div></div><div class="callout" style="margin-bottom:16px"><div class="calloutIcon">⟷</div><div><b>Hybrid interlock</b><div class="hint">Use this page to connect fixed deliverables from the WBS to agile stories. A deliverable with many unfinished or blocked stories will trigger AI delivery risk warnings.</div></div></div><div class="card"><div class="cardTitle"><h3>Deliverable-to-Story Traceability</h3><span class="eyebrow">Hybrid governance</span></div><div class="tableWrap"><table><thead><tr><th>WBS Deliverable</th><th>Linked Stories</th><th>Story Points</th><th>Done Points</th><th>Blocked</th><th>Signal</th></tr></thead><tbody>${tasks.map(t=>{const ss=stories.filter(s=>s.linkedTaskId===t.id);const pts=ss.reduce((a,s)=>a+(+s.points||0),0),done=ss.filter(s=>s.status==='Done').reduce((a,s)=>a+(+s.points||0),0),blocked=ss.filter(s=>s.blocked).length;return `<tr><td><b>${esc(t.wbs)} ${esc(t.name)}</b><div>${pctBar(t.percent)}</div></td><td>${ss.map(s=>`<div class="hint">${esc(s.title)} · ${statusBadge(s.status)}</div>`).join('')||'<span class="hint">No linked stories</span>'}</td><td class="mono">${pts}</td><td class="mono">${done}</td><td>${blocked?`<span class="badge bRed">${blocked}</span>`:'<span class="badge bGreen">0</span>'}</td><td>${blocked||(+t.percent<50&&pts>10)?'<span class="badge bWarn">Watch</span>':'<span class="badge bGreen">Healthy</span>'}</td></tr>`}).join('')}</tbody></table></div></div>`}
function renderBudgetView(p){const items=projectBudgets(p.id);const m=projectMetrics(p);const taskCost=projectTasks(p.id).reduce((a,t)=>a+(+t.actualCost||0),0);return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openBudgetModal()">+ Budget Item</button><button class="btn" onclick="printProjectChartsPDF()">Download Budget Charts PDF</button></div></div><div class="grid kpi"><div class="card kpiCard"><div class="kpiLabel">Planned</div><div class="kpiValue" style="font-size:23px">${money(m.planned,p.currency)}</div></div><div class="card kpiCard"><div class="kpiLabel">Actual</div><div class="kpiValue" style="font-size:23px">${money(m.actual,p.currency)}</div></div><div class="card kpiCard"><div class="kpiLabel">Forecast</div><div class="kpiValue" style="font-size:23px">${money(m.forecast,p.currency)}</div></div><div class="card kpiCard"><div class="kpiLabel">Task Actuals</div><div class="kpiValue" style="font-size:23px">${money(taskCost,p.currency)}</div><div class="kpiSub">From WBS task-level cost</div></div><div class="card kpiCard"><div class="kpiLabel">Variance</div><div class="kpiValue" style="font-size:23px">${money(m.planned-m.forecast,p.currency)}</div></div></div><div class="grid two" style="margin-top:16px"><div class="card"><div class="cardTitle"><h3>Budget Items</h3></div><div class="tableWrap"><table><thead><tr><th>Category</th><th>Item</th><th>Type</th><th>Planned</th><th>Actual</th><th>Forecast</th><th></th></tr></thead><tbody>${items.map(b=>`<tr><td><span class="badge bBlue">${esc(b.category)}</span></td><td>${esc(b.item)}</td><td>${esc(b.type)}</td><td class="mono">${money(b.planned,p.currency)}</td><td class="mono">${money(b.actual,p.currency)}</td><td class="mono">${money(b.forecast,p.currency)}</td><td><button class="btn sm" onclick="openBudgetModal('${b.id}')">Edit</button></td></tr>`).join('')}</tbody></table></div></div><div class="card"><div class="cardTitle"><h3>Budget Category Chart</h3></div><div id="chartBudget" class="chartBox"></div></div></div>`}
function openBudgetModal(bid){const p=getP(),b=bid?db.budgets.find(x=>x.id===bid):{projectId:p.id,category:db.masters.budgetCategories[0],item:'',type:'OPEX',planned:0,actual:0,forecast:0};state.editing=bid||null;openModal(bid?'Edit Budget Item':'Add Budget Item',`<div class="formGrid"><div class="field"><label>Category</label><select class="select" id="budCat">${db.masters.budgetCategories.map(x=>`<option ${b.category===x?'selected':''}>${esc(x)}</option>`).join('')}</select></div><div class="field"><label>CAPEX / OPEX</label><select class="select" id="budType">${['CAPEX','OPEX'].map(x=>`<option ${b.type===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="field" style="margin-top:12px"><label>Item</label><input class="input" id="budItem" value="${esc(b.item)}"></div><div class="formGrid three" style="margin-top:12px"><div class="field"><label>Planned</label><input class="input" type="number" id="budPlanned" value="${+b.planned||0}"></div><div class="field"><label>Actual</label><input class="input" type="number" id="budActual" value="${+b.actual||0}"></div><div class="field"><label>Forecast</label><input class="input" type="number" id="budForecast" value="${+b.forecast||0}"></div></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveBudgetModal()">Save Budget</button>`)}
function saveBudgetModal(){const p=getP();const obj={projectId:p.id,category:document.getElementById('budCat').value,type:document.getElementById('budType').value,item:document.getElementById('budItem').value.trim(),planned:+document.getElementById('budPlanned').value||0,actual:+document.getElementById('budActual').value||0,forecast:+document.getElementById('budForecast').value||0};if(!obj.item){toast('Budget item required','err');return}if(state.editing)Object.assign(db.budgets.find(b=>b.id===state.editing),obj);else db.budgets.push({id:id('bud'),...obj});saveDB();closeModal();render()}
function renderResourcesView(p){const selected=projectResources(p.id);return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openResourceModal()">+ Add Resource</button><button class="btn" onclick="openProjectModal('${p.id}')">Select Resources for Project</button></div></div><div class="card"><div class="cardTitle"><h3>Project Resource Team</h3><span class="eyebrow">Used in tasks and stories</span></div><div class="tableWrap"><table><thead><tr><th>Name</th><th>Designation</th><th>Location</th><th>Rate</th><th>Capacity</th><th>Skills</th><th></th></tr></thead><tbody>${selected.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td>${esc(r.designation)}</td><td>${esc(r.location)}</td><td class="mono">${money(r.rate,p.currency)}/day</td><td>${pctBar(r.capacity)}</td><td>${esc(r.skills)}</td><td><button class="btn sm" onclick="openResourceModal('${r.id}')">Edit</button></td></tr>`).join('')}</tbody></table></div></div>`}
function openResourceModal(rid){const r=rid?db.resources.find(x=>x.id===rid):{name:'',designation:db.masters.designations[0],location:db.masters.locations[0],rate:0,capacity:100,skills:''};state.editing=rid||null;openModal(rid?'Edit Resource':'Add Resource to Master',`<div class="formGrid"><div class="field"><label>Name</label><input class="input" id="resName" value="${esc(r.name)}"></div><div class="field"><label>Designation</label><input class="input" list="designationList" id="resDes" value="${esc(r.designation)}"><datalist id="designationList">${db.masters.designations.map(x=>`<option value="${esc(x)}">`).join('')}</datalist></div></div><div class="formGrid three" style="margin-top:12px"><div class="field"><label>Location</label><input class="input" list="locationList" id="resLoc" value="${esc(r.location)}"><datalist id="locationList">${db.masters.locations.map(x=>`<option value="${esc(x)}">`).join('')}</datalist></div><div class="field"><label>Rate / day</label><input class="input" type="number" id="resRate" value="${+r.rate||0}"></div><div class="field"><label>Capacity %</label><input class="input" type="number" id="resCap" value="${+r.capacity||100}"></div></div><div class="field" style="margin-top:12px"><label>Skills</label><textarea id="resSkills">${esc(r.skills||'')}</textarea></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveResourceModal()">Save Resource</button>`)}
function saveResourceModal(){const obj={name:document.getElementById('resName').value.trim(),designation:document.getElementById('resDes').value.trim(),location:document.getElementById('resLoc').value.trim(),rate:+document.getElementById('resRate').value||0,capacity:clamp(document.getElementById('resCap').value,0,200),skills:document.getElementById('resSkills').value.trim()};if(!obj.name){toast('Resource name required','err');return}let rid=state.editing;if(rid){Object.assign(db.resources.find(r=>r.id===rid),obj)}else{rid=id('res');db.resources.push({id:rid,...obj});const p=getP();if(p){p.resourceIds=p.resourceIds||[];if(!p.resourceIds.includes(rid))p.resourceIds.push(rid)}}saveDB();closeModal();render()}
function renderRaidView(p){const risks=projectRisks(p.id);return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openRiskModal()">+ Add RAID Item</button></div></div><div class="grid two"><div class="card"><div class="cardTitle"><h3>RAID Register</h3><span class="eyebrow">Risk, assumption, issue, dependency</span></div><div class="tableWrap"><table><thead><tr><th>Item</th><th>Category</th><th>P</th><th>I</th><th>Score</th><th>Status</th><th>Owner</th><th></th></tr></thead><tbody>${risks.map(r=>`<tr><td><b>${esc(r.title)}</b><div class="hint">${esc(r.response||'')}</div></td><td>${esc(r.category)}</td><td class="mono">${r.prob}</td><td class="mono">${r.impact}</td><td>${statusBadge(String(r.prob*r.impact))}</td><td>${statusBadge(r.status)}</td><td>${esc(db.resources.find(x=>x.id===r.owner)?.name||'')}</td><td><button class="btn sm" onclick="openRiskModal('${r.id}')">Edit</button></td></tr>`).join('')}</tbody></table></div></div><div class="card"><div class="cardTitle"><h3>Risk Matrix</h3></div><div id="chartRiskMatrix" class="chartBox"></div></div></div>`}
function openRiskModal(rid){const p=getP(),r=rid?db.risks.find(x=>x.id===rid):{projectId:p.id,title:'',category:db.masters.riskCategories[0],prob:3,impact:3,status:'Open',owner:'',response:'',linkedTaskWbs:''};state.editing=rid||null;openModal(rid?'Edit RAID Item':'Add RAID Item',`<div class="field"><label>Description</label><textarea id="riskTitle">${esc(r.title)}</textarea></div><div class="formGrid three" style="margin-top:12px"><div class="field"><label>Category</label><select class="select" id="riskCat">${db.masters.riskCategories.map(x=>`<option ${r.category===x?'selected':''}>${esc(x)}</option>`).join('')}</select></div><div class="field"><label>Probability</label><input class="input" type="number" min="1" max="5" id="riskProb" value="${r.prob}"></div><div class="field"><label>Impact</label><input class="input" type="number" min="1" max="5" id="riskImpact" value="${r.impact}"></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Status</label><select class="select" id="riskStatus">${['Open','Mitigated','Closed','Accepted','Escalated'].map(x=>`<option ${r.status===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Owner</label><select class="select" id="riskOwner"><option value="">Unassigned</option>${db.resources.map(x=>`<option value="${x.id}" ${r.owner===x.id?'selected':''}>${esc(x.name)}</option>`).join('')}</select></div></div><div class="field" style="margin-top:12px"><label>Response / Mitigation</label><textarea id="riskResp">${esc(r.response||'')}</textarea></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveRiskModal()">Save RAID</button>`)}
function saveRiskModal(){const p=getP();const obj={projectId:p.id,title:document.getElementById('riskTitle').value.trim(),category:document.getElementById('riskCat').value,prob:clamp(document.getElementById('riskProb').value,1,5),impact:clamp(document.getElementById('riskImpact').value,1,5),status:document.getElementById('riskStatus').value,owner:document.getElementById('riskOwner').value,response:document.getElementById('riskResp').value.trim()};if(!obj.title){toast('Description required','err');return}if(state.editing)Object.assign(db.risks.find(r=>r.id===state.editing),obj);else db.risks.push({id:id('risk'),...obj});saveDB();closeModal();render()}
function renderReportsView(p){return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="printProjectChartsPDF()">Download Project Charts PDF</button><button class="btn" onclick="printGanttPDF()" ${canGantt(p)?'':'disabled'}>Download Gantt PDF</button></div></div><div class="grid two"><div class="card"><div class="cardTitle"><h3>Health Trend / Delivery Confidence</h3></div><div id="chartProjectHealth" class="chartBox"></div></div><div class="card"><div class="cardTitle"><h3>Budget Planned vs Actual vs Forecast</h3></div><div id="chartBudget2" class="chartBox"></div></div><div class="card"><div class="cardTitle"><h3>Work Status Distribution</h3></div><div id="chartWorkStatus" class="chartBox"></div></div><div class="card"><div class="cardTitle"><h3>Resource Utilization</h3></div><div id="chartResource" class="chartBox"></div></div><div class="card"><div class="cardTitle"><h3>Risk Exposure</h3></div><div id="chartRiskBars" class="chartBox"></div></div><div class="card"><div class="cardTitle"><h3>Critical Path Float</h3></div><div id="chartFloat" class="chartBox"></div></div></div>`}
function renderAIView(p){const ai=aiAnalysis(p);return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="render()">Refresh Prediction</button><button class="btn" onclick="printProjectChartsPDF()">Download AI Report PDF</button></div></div><div class="grid two"><div class="card"><div class="cardTitle"><h3>AI Prediction Summary</h3><span class="eyebrow">Local rule-based intelligence</span></div><div style="display:flex;gap:18px;align-items:center"><div class="aiScore" style="--deg:${ai.confidence*3.6}deg"><span>${ai.confidence}%</span></div><div><h2 style="margin:0 0 8px">${esc(ai.label)}</h2><p class="hint" style="font-size:14px">${esc(ai.summary)}</p>${statusBadge(ai.confidence>=80?'High Confidence':ai.confidence>=60?'Medium Confidence':'Low Confidence')}</div></div></div><div class="card"><div class="cardTitle"><h3>Prediction Indicators</h3></div>${ai.indicators.map(i=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:900"><span>${esc(i.name)}</span><span>${i.score}%</span></div>${pctBar(i.score)}<div class="hint">${esc(i.note)}</div></div>`).join('')}</div></div><div class="grid two" style="margin-top:16px"><div class="card"><div class="cardTitle"><h3>Smart Recommendations</h3></div><ol class="hint" style="margin:0;padding-left:20px">${ai.recommendations.map(x=>`<li>${esc(x)}</li>`).join('')}</ol></div><div class="card"><div class="cardTitle"><h3>Critical Path and Dependency Insight</h3></div><div class="tableWrap"><table><thead><tr><th>WBS</th><th>Task</th><th>Finish</th><th>Float</th><th>Signal</th></tr></thead><tbody>${ai.criticalTasks.map(t=>`<tr><td>${esc(t.wbs)}</td><td>${esc(t.name)}</td><td class="mono">${niceDate(t.finishDate)}</td><td class="mono">${t.float}d</td><td>${t.critical?'<span class="badge bRed">Critical</span>':'<span class="badge bGreen">Float</span>'}</td></tr>`).join('')||'<tr><td colspan="5" class="hint">No critical path tasks available for this model.</td></tr>'}</tbody></table></div></div></div>`}
function aiAnalysis(p){const m=projectMetrics(p);const indicators=[];let scheduleRisk=clamp((1-m.spi)*100 + m.overdue.length*12 + m.critical.filter(t=>t.finishDate<today()&&t.percent<100).length*18,0,100);let budgetRisk=clamp((m.forecast-m.planned)/Math.max(1,m.planned)*100 + (1-m.cpi)*70,0,100);let riskExposure=clamp(m.openRisks.reduce((a,r)=>a+r.prob*r.impact,0)*3,0,100);let resourceRisk=resourceOverloadScore(p);let sprintRisk=0;if(canScrum(p)){const s=activeSprint(p.id);sprintRisk=s?sprintMetrics(p.id,s.id).burnRisk:20}indicators.push({name:'Schedule Slippage Probability',score:Math.round(scheduleRisk),note:'Uses SPI, overdue tasks, dependency chain and critical path exposure.'},{name:'Budget Overrun Probability',score:Math.round(budgetRisk),note:'Uses forecast, actual spend, CPI and category variance.'},{name:'Risk Escalation Probability',score:Math.round(riskExposure),note:'Uses open risk probability x impact distribution.'},{name:'Resource Burnout / Overload',score:Math.round(resourceRisk),note:'Uses resource allocation across tasks and stories.'});if(canScrum(p))indicators.push({name:'Sprint Failure Risk',score:Math.round(sprintRisk),note:'Uses sprint remaining points, elapsed days and blocked stories.'});const avgRisk=indicators.reduce((a,i)=>a+i.score,0)/indicators.length;const confidence=clamp(Math.round(100-avgRisk),0,100);const rec=[];if(scheduleRisk>45)rec.push('Run a critical-path review and focus on zero-float tasks before adding new work.');if(budgetRisk>45)rec.push('Freeze discretionary spend and review license, cloud, vendor and resource cost lines.');if(resourceRisk>40)rec.push('Rebalance overloaded resources; move non-critical work or add capacity.');if(sprintRisk>45)rec.push('Reduce sprint scope, unblock stories, and avoid starting new cards until WIP is lowered.');if(riskExposure>45)rec.push('Convert high risks into owned mitigation actions with dates and escalation criteria.');if(p.mode===MODE_HYBRID)rec.push('For hybrid control, ensure every sprint story supporting a fixed deliverable is linked to the corresponding WBS item.');if(!rec.length)rec.push('Maintain cadence: weekly baseline review, budget review, sprint inspection and RAID refresh.');const summary=`Delivery confidence is ${confidence}%. The strongest risk drivers are ${indicators.sort((a,b)=>b.score-a.score).slice(0,2).map(i=>i.name).join(' and ')}.`;return {confidence,label:confidence>=80?'Likely to meet delivery commitments':confidence>=60?'Delivery possible with active control':'Delivery at risk without corrective action',summary,indicators,recommendations:rec,criticalTasks:projectTasks(p.id).filter(t=>t.type!=='Summary'&&t.critical).slice(0,12)}}
function resourceOverloadScore(p){const res=projectResources(p.id);if(!res.length)return 20;const tasks=projectTasks(p.id).filter(t=>t.assignee);const stories=projectStories(p.id).filter(s=>s.assignee&&s.status!=='Done');let score=0;res.forEach(r=>{const taskLoad=tasks.filter(t=>t.assignee===r.id&&t.percent<100).length*16;const storyLoad=stories.filter(s=>s.assignee===r.id).reduce((a,s)=>a+(+s.points||0),0)*3;const capacity=r.capacity||100;score+=clamp((taskLoad+storyLoad)-capacity/2,0,100)});return clamp(score/Math.max(1,res.length),0,100)}
function renderMasters(){return `<div class="stickyActions"><div class="btnRow"><button class="btn primary" onclick="openResourceModal()">+ Resource Master</button><button class="btn" onclick="exportBackup()">Export Backup</button><button class="btn" onclick="resetSampleData()">Reset Sample Data</button></div></div><div class="grid two"><div class="card"><div class="cardTitle"><h3>Master Dropdown Lists</h3><span class="eyebrow">Global configurable values</span></div>${Object.keys(db.masters).map(k=>`<div style="margin-bottom:14px"><div class="eyebrow">${esc(k)}</div><div class="btnRow" style="margin-top:7px">${db.masters[k].map((v,i)=>`<span class="badge bGray">${esc(v)} <button style="border:0;background:transparent;color:inherit" onclick="removeMaster('${k}',${i})">×</button></span>`).join('')}<button class="btn sm" onclick="addMaster('${k}')">+ Add</button></div></div>`).join('')}</div><div class="card"><div class="cardTitle"><h3>Resource Master</h3></div><div class="tableWrap"><table><thead><tr><th>Name</th><th>Designation</th><th>Location</th><th>Rate</th><th>Capacity</th><th></th></tr></thead><tbody>${db.resources.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td>${esc(r.designation)}</td><td>${esc(r.location)}</td><td class="mono">${money(r.rate)}</td><td>${pctBar(r.capacity)}</td><td><button class="btn sm" onclick="openResourceModal('${r.id}')">Edit</button></td></tr>`).join('')}</tbody></table></div></div></div>`}
function addMaster(k){const v=prompt('Add value to '+k);if(v){db.masters[k].push(v.trim());saveDB();render()}}

function renderHelp(){return `<div class="grid two"><div class="card"><div class="cardTitle"><h3>How to use this tool</h3></div><ol class="hint" style="font-size:14px;line-height:1.8"><li>Create a project and choose its operating model: Fixed Bid / Waterfall, Agile Scrum / T&M, or Hybrid.</li><li>Open the project. Fixed projects use Fixed Plan / Gantt. Agile projects use Sprint Board. Hybrid projects use both and the Hybrid Links page.</li><li>Add resources either in Masters or directly while creating a task.</li><li>For fixed work, create WBS tasks, add dependency strings such as <b>1.2FS+0</b>, then save. The schedule engine recalculates downstream dates.</li><li>Save a baseline after approval. Later live bars will show slippage against baseline bars.</li><li>For Scrum, create sprints, add user stories, estimate points, and drag cards across board columns.</li><li>Track budget line items plus task-level planned and actual costs.</li><li>Use Reports and AI Prediction for project-level status. Use All Projects Summary only for consolidated overview.</li></ol></div><div class="card"><div class="cardTitle"><h3>Which model should I choose?</h3></div><div class="hint"><p><b>Fixed Bid / Waterfall:</b> choose when deliverables, acceptance criteria, timelines and cost are mostly fixed. Use WBS, Gantt, dependency logic, CPM, baseline and variance control.</p><p><b>Agile Scrum / T&M:</b> choose when scope evolves sprint by sprint. Use product backlog, sprint board, burndown, velocity and rolling budget burn.</p><p><b>Hybrid:</b> choose when high-level deliverables or governance milestones are fixed, but detailed build work is delivered through agile sprints. Link stories to WBS deliverables.</p></div></div></div>`}
function renderAppendix(){return `<div class="card"><div class="cardTitle"><h3>Calculation Appendix</h3></div><div class="hint" style="font-size:14px;line-height:1.75"><p><b>FS dependency:</b> successor start must be after predecessor finish plus lag. Example: 1.1FS+2 means start two days after task 1.1 finishes.</p><p><b>SS dependency:</b> successor start is constrained by predecessor start plus lag.</p><p><b>FF dependency:</b> successor finish is constrained by predecessor finish plus lag.</p><p><b>SF dependency:</b> successor finish is constrained by predecessor start plus lag.</p><p><b>Critical Path Method:</b> the engine performs forward scheduling and backward pass. Total float = Latest Start - Earliest Start. Tasks with zero float are critical and highlighted red.</p><p><b>Baseline slippage:</b> baseline bars are saved historical start/finish dates. Live bars are current calculated dates. A live bar shifted right of its baseline indicates schedule slippage.</p><p><b>SPI:</b> Earned Value / Planned Value. Values below 1 indicate schedule underperformance.</p><p><b>CPI:</b> Earned Value / Actual Cost. Values below 1 indicate cost inefficiency.</p><p><b>Burndown:</b> remaining story points are compared with an ideal line across sprint days. Elevated remaining points late in sprint increases sprint failure prediction.</p><p><b>AI Prediction:</b> all predictions are local JavaScript scoring rules using project data: schedule variance, CPM, budget forecast, risk exposure, resource overload and sprint burn risk.</p></div></div>`}
function openProjectModal(pid){const p=pid?db.projects.find(x=>x.id===pid):{name:'',mode:MODE_FIXED,pricingModel:'Fixed Bid',client:'',currency:db.masters.currencies[0],budget:0,startDate:today(),endDate:dateAdd(today(),60),status:'On Track',health:'Green',location:db.masters.locations[0],priority:'Medium',description:'',resourceIds:[],color:COLORS[db.projects.length%COLORS.length]};state.editing=pid||null;openModal(pid?'Edit Project':'Create Project',`<div class="formGrid"><div class="field"><label>Project Name</label><input class="input" id="projName" value="${esc(p.name)}"></div><div class="field"><label>Operating Model</label><select class="select" id="projMode" onchange="syncPricingFromMode()">${[MODE_FIXED,MODE_AGILE,MODE_HYBRID].map(x=>`<option ${p.mode===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="formGrid three" style="margin-top:12px"><div class="field"><label>Pricing Model</label><select class="select" id="projPricing">${['Fixed Bid','Time & Material','Hybrid','Internal'].map(x=>`<option ${p.pricingModel===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Client / Business Unit</label><input class="input" id="projClient" value="${esc(p.client)}"></div><div class="field"><label>Status</label><select class="select" id="projStatus">${['On Track','At Risk','Delayed','On Hold','Completed'].map(x=>`<option ${p.status===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="formGrid three" style="margin-top:12px"><div class="field"><label>Currency</label><select class="select" id="projCurrency">${db.masters.currencies.map(x=>`<option ${p.currency===x?'selected':''}>${esc(x)}</option>`).join('')}</select></div><div class="field"><label>Budget</label><input class="input" type="number" id="projBudget" value="${+p.budget||0}"></div><div class="field"><label>Location</label><select class="select" id="projLocation">${db.masters.locations.map(x=>`<option ${p.location===x?'selected':''}>${esc(x)}</option>`).join('')}</select></div></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Start Date</label><input class="input" type="date" id="projStart" value="${p.startDate}"></div><div class="field"><label>Target End Date</label><input class="input" type="date" id="projEnd" value="${p.endDate}"></div></div><div class="field" style="margin-top:12px"><label>Description</label><textarea id="projDesc">${esc(p.description||'')}</textarea></div><div class="field" style="margin-top:12px"><label>Project Resources</label><div class="btnRow">${db.resources.map(r=>`<label class="badge bGray" style="cursor:pointer"><input type="checkbox" class="projRes" value="${r.id}" ${p.resourceIds?.includes(r.id)?'checked':''}> ${esc(r.name)}</label>`).join('')}</div></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveProjectModal()">Save Project</button>`)}
function syncPricingFromMode(){const mode=document.getElementById('projMode').value;const el=document.getElementById('projPricing');if(mode===MODE_FIXED)el.value='Fixed Bid';else if(mode===MODE_AGILE)el.value='Time & Material';else el.value='Hybrid'}
function saveProjectModal(){const obj={name:document.getElementById('projName').value.trim(),mode:document.getElementById('projMode').value,pricingModel:document.getElementById('projPricing').value,client:document.getElementById('projClient').value.trim(),status:document.getElementById('projStatus').value,currency:document.getElementById('projCurrency').value,budget:+document.getElementById('projBudget').value||0,location:document.getElementById('projLocation').value,startDate:document.getElementById('projStart').value,endDate:document.getElementById('projEnd').value,description:document.getElementById('projDesc').value.trim(),resourceIds:[...document.querySelectorAll('.projRes:checked')].map(x=>x.value)};if(!obj.name){toast('Project name required','err');return}if(state.editing){Object.assign(db.projects.find(p=>p.id===state.editing),obj)}else{const pid=id('prj');db.projects.push({id:pid,color:COLORS[db.projects.length%COLORS.length],priority:'Medium',...obj});state.projectId=pid}saveDB();closeModal();render()}
function deleteProject(pid){if(!confirm('Delete this project and all project data?'))return;db.projects=db.projects.filter(p=>p.id!==pid);db.tasks=db.tasks.filter(t=>t.projectId!==pid);db.stories=db.stories.filter(s=>s.projectId!==pid);db.sprints=db.sprints.filter(s=>s.projectId!==pid);db.budgets=db.budgets.filter(b=>b.projectId!==pid);db.risks=db.risks.filter(r=>r.projectId!==pid);state.projectId=db.projects[0]?.id||null;state.view='register';saveDB();render()}

function drawChartsForView(){if(state.view==='summary'){drawDonut('chartMode','Project Models',countBy(db.projects,p=>p.mode));drawBar('chartHealth','Project Health',db.projects.map(p=>p.name),db.projects.map(p=>projectMetrics(p).health),'Health %')}if(state.view==='scrum'){const p=getP();const s=activeSprint(p.id);if(s){drawBurndown('chartBurndown',p,s);drawVelocity('chartVelocity',p)}else{document.getElementById('chartBurndown').innerHTML='<div class="empty"><h3>No active sprint</h3></div>';drawVelocity('chartVelocity',p)}}if(state.view==='budget'){const p=getP();drawBudget('chartBudget',p)}if(state.view==='raid'){const p=getP();drawRiskMatrix('chartRiskMatrix',p)}if(state.view==='reports'){const p=getP();drawReportCharts(p)} }
function countBy(arr,fn){const o={};arr.forEach(x=>{const k=fn(x)||'Unknown';o[k]=(o[k]||0)+1});return o}
function svgWrap(inner,w=560,h=260){return `<svg class="chartSvg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${inner}</svg>`}
function drawBar(id,title,labels,values,label='Value'){const el=document.getElementById(id);if(!el)return;const w=560,h=260,pad=42,max=Math.max(1,...values);const bw=(w-pad*2)/Math.max(1,values.length);let s=`<text x="${pad}" y="22" fill="${cssVar('--text')}" font-size="14" font-weight="900">${esc(title)}</text>`;values.forEach((v,i)=>{const x=pad+i*bw+8,bh=(h-70)*(v/max),y=h-32-bh;s+=`<rect x="${x}" y="${y}" width="${Math.max(8,bw-16)}" height="${bh}" rx="6" fill="${COLORS[i%COLORS.length]}" opacity=".78"/><text x="${x+(bw-16)/2}" y="${y-6}" text-anchor="middle" fill="${cssVar('--muted')}" font-size="10">${fmt(v)}</text><text x="${x+(bw-16)/2}" y="${h-12}" text-anchor="middle" fill="${cssVar('--muted')}" font-size="9">${esc(String(labels[i]).slice(0,10))}</text>`});el.innerHTML=svgWrap(s,w,h)}
function drawDonut(id,title,obj){const el=document.getElementById(id);if(!el)return;const entries=Object.entries(obj);const total=entries.reduce((a,e)=>a+e[1],0)||1;let angle=0;let segs='';entries.forEach(([k,v],i)=>{const a1=angle,a2=angle+v/total*360;angle=a2;segs+=donutSeg(130,130,70,38,a1,a2,COLORS[i%COLORS.length])});let legend=entries.map(([k,v],i)=>`<div class="badge bGray"><span style="width:8px;height:8px;background:${COLORS[i%COLORS.length]};border-radius:50%;display:inline-block"></span>${esc(k)} ${v}</div>`).join('');el.innerHTML=`${svgWrap(`<text x="26" y="24" fill="${cssVar('--text')}" font-size="14" font-weight="900">${esc(title)}</text>${segs}<text x="130" y="136" text-anchor="middle" fill="${cssVar('--text')}" font-size="24" font-weight="900">${total}</text>`,300,260)}<div class="btnRow" style="justify-content:center;margin-top:-18px">${legend}</div>`}
function donutSeg(cx,cy,r,th,a1,a2,color){const rad=a=>((a-90)*Math.PI/180),large=a2-a1>180?1:0;const x1=cx+r*Math.cos(rad(a1)),y1=cy+r*Math.sin(rad(a1)),x2=cx+r*Math.cos(rad(a2)),y2=cy+r*Math.sin(rad(a2));const r2=r-th;const x3=cx+r2*Math.cos(rad(a2)),y3=cy+r2*Math.sin(rad(a2)),x4=cx+r2*Math.cos(rad(a1)),y4=cy+r2*Math.sin(rad(a1));return `<path d="M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${r2},${r2} 0 ${large} 0 ${x4},${y4} Z" fill="${color}" opacity=".8"/>`}
function drawBudget(id,p){const cats=countBy(projectBudgets(p.id),b=>b.category);const labels=Object.keys(cats);const planned=labels.map(c=>projectBudgets(p.id).filter(b=>b.category===c).reduce((a,b)=>a+(+b.planned||0),0));const actual=labels.map(c=>projectBudgets(p.id).filter(b=>b.category===c).reduce((a,b)=>a+(+b.actual||0),0));drawGrouped(id,'Budget by Category',labels,[{name:'Planned',data:planned,color:cssVar('--primary')},{name:'Actual',data:actual,color:cssVar('--warn')}])}
function drawGrouped(id,title,labels,series){const el=document.getElementById(id);if(!el)return;const w=560,h=260,pad=46,max=Math.max(1,...series.flatMap(s=>s.data));const group=(w-pad*2)/Math.max(1,labels.length),barW=Math.max(6,(group-18)/series.length);let out=`<text x="${pad}" y="22" fill="${cssVar('--text')}" font-size="14" font-weight="900">${esc(title)}</text>`;labels.forEach((lab,i)=>{series.forEach((sr,j)=>{const v=sr.data[i]||0,bh=(h-72)*(v/max),x=pad+i*group+8+j*barW,y=h-34-bh;out+=`<rect x="${x}" y="${y}" width="${barW-2}" height="${bh}" rx="4" fill="${sr.color}" opacity=".78"/>`});out+=`<text x="${pad+i*group+group/2}" y="${h-12}" text-anchor="middle" fill="${cssVar('--muted')}" font-size="9">${esc(lab.slice(0,9))}</text>`});el.innerHTML=svgWrap(out,w,h)}
function drawBurndown(id,p,sprint){const el=document.getElementById(id);if(!el)return;const m=sprintMetrics(p.id,sprint.id),w=560,h=260,pad=42;let points='',ideal='';for(let d=0;d<=m.days;d++){const x=pad+d*(w-pad*2)/m.days,iv=m.total*(1-d/m.days),actual=d<m.elapsed?Math.max(0,m.total-(m.done*(d/Math.max(1,m.elapsed)))):m.remaining;const y1=h-32-iv/m.total*(h-70),y2=h-32-actual/Math.max(1,m.total)*(h-70);ideal+=(d?' L':'M')+x+','+y1;points+=(d?' L':'M')+x+','+y2}el.innerHTML=svgWrap(`<text x="${pad}" y="22" fill="${cssVar('--text')}" font-size="14" font-weight="900">Burndown</text><path d="${ideal}" fill="none" stroke="${cssVar('--muted')}" stroke-width="2" stroke-dasharray="6 5"/><path d="${points}" fill="none" stroke="${cssVar('--primary')}" stroke-width="4"/><text x="${pad}" y="${h-10}" fill="${cssVar('--muted')}" font-size="10">Remaining ${m.remaining}/${m.total} pts · Risk ${Math.round(m.burnRisk)}%</text>`,w,h)}
function drawVelocity(id,p){const sps=projectSprints(p.id);const labels=sps.map(s=>s.name);const values=sps.map(s=>sprintMetrics(p.id,s.id).done);drawBar(id,'Velocity',labels,values,'Done points')}
function drawRiskMatrix(id,p){const risks=projectRisks(p.id);let grid='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">';for(let impact=5;impact>=1;impact--){for(let prob=1;prob<=5;prob++){const count=risks.filter(r=>r.prob===prob&&r.impact===impact).length;const score=prob*impact;const bg=score>=15?'var(--danger)':score>=8?'var(--warn)':'var(--accent)';grid+=`<div style="aspect-ratio:1;border-radius:12px;display:grid;place-items:center;background:${bg};opacity:${count?'.9':'.18'};color:white;font-weight:950">${count||''}</div>`}}grid+='</div><div class="hint" style="margin-top:10px">X-axis = probability, Y-axis = impact.</div>';document.getElementById(id).innerHTML=grid}
function drawReportCharts(p){const m=projectMetrics(p);drawBar('chartProjectHealth','Delivery Confidence',[p.name],[m.health]);drawBudget('chartBudget2',p);const status=countBy([...projectTasks(p.id).filter(t=>t.type!=='Summary').map(t=>({s:t.percent>=100?'Done':t.percent>0?'In Progress':'Not Started'})),...projectStories(p.id).map(s=>({s:s.status}))],x=>x.s);drawDonut('chartWorkStatus','Work Status',status);drawBar('chartResource','Resource Capacity',projectResources(p.id).map(r=>r.name),projectResources(p.id).map(r=>r.capacity),'Capacity');drawBar('chartRiskBars','Risk Scores',projectRisks(p.id).map(r=>r.category),projectRisks(p.id).map(r=>r.prob*r.impact),'Score');drawBar('chartFloat','Task Float',projectTasks(p.id).filter(t=>t.type!=='Summary').map(t=>t.wbs),projectTasks(p.id).filter(t=>t.type!=='Summary').map(t=>t.float||0),'Float')}

function printHtml(title,body){const w=window.open('','_blank');if(!w){toast('Popup blocked. Allow popups to print PDF.','err');return}const styles=document.querySelector('style').innerHTML;w.document.write(`<!doctype html><html><head><title>${esc(title)}</title><style>${styles}body{overflow:auto!important}.app,.topbar,.sidebar,.fab,.calc,.stickyActions{display:none!important}.content{display:block!important;padding:20px}.card{break-inside:avoid;margin-bottom:14px}</style></head><body data-theme="${db.theme||'light'}"><section class="content"><h1>${esc(title)}</h1>${body}</section><script>setTimeout(()=>window.print(),600)<\/script></body></html>`);w.document.close()}

function importBackup(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';inp.onchange=()=>{const f=inp.files[0];if(!f)return;const reader=new FileReader();reader.onload=()=>{try{db=JSON.parse(reader.result);saveDB();state.projectId=db.projects[0]?.id||null;toast('Backup imported','ok');render()}catch(e){toast('Invalid backup file','err')}};reader.readAsText(f)};inp.click()}

function initResponsiveShell(){
  document.body.classList.add('compact-ui');
  if(!document.getElementById('chartTip')){
    const tip=document.createElement('div');tip.id='chartTip';tip.className='chartTip';document.body.appendChild(tip);
  }
  document.addEventListener('pointermove',function(e){
    const t=e.target.closest && e.target.closest('[data-tip]');
    const tip=document.getElementById('chartTip');
    if(!tip)return;
    if(t){tip.textContent=t.getAttribute('data-tip');tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY+14)+'px';tip.classList.add('show')}
    else tip.classList.remove('show');
  },true);
  document.addEventListener('pointerleave',function(){const tip=document.getElementById('chartTip');if(tip)tip.classList.remove('show')},true);
  if(!window.__pmNavCloseBound){document.addEventListener('click',closeNavMenus);document.addEventListener('keydown',e=>{if(e.key==='Escape')closeNavMenus()});window.__pmNavCloseBound=true;}
  if(!state.summaryTab)state.summaryTab='overview';
}
function selectProjectFromTop(pid){
  if(!pid){state.projectId=null;state.view='summary';render();return}
  state.projectId=pid;
  if(['summary','register','masters','help','appendix'].includes(state.view))state.view='cockpit';
  render();
}
function renderProjectPicker(){
  const el=document.getElementById('projectPicker');if(!el)return;
  const options=['<option value="">All projects summary</option>'].concat(db.projects.map(p=>`<option value="${p.id}" ${p.id===state.projectId?'selected':''}>${esc(p.name)} · ${esc(p.mode)}</option>`));
  el.innerHTML=options.join('');
}
function navDisabled(view,p){
  if(['cockpit','budget','resources','raid','reports','ai'].includes(view))return !p;
  if(view==='gantt')return !p||!canGantt(p);
  if(view==='scrum')return !p||!canScrum(p);
  if(view==='hybrid')return !p||p.mode!==MODE_HYBRID;
  return false;
}
function renderWorkspaceNav(){
  const el=document.getElementById('workspaceNav');if(!el)return;const p=getP();
  const groups=[
    {title:'All Projects',icon:'▦',note:'Consolidated views',items:[['summary','Summary','▦'],['register','Register','☷']]},
    {title:'Selected Project',icon:'⌂',note:p?esc(p.name):'Select project first',items:[['cockpit','Cockpit','⌂'],['gantt','Fixed Plan / Gantt','▤'],['scrum','Sprint Board','▥'],['hybrid','Hybrid Links','⟷'],['budget','Budget','◌'],['resources','Team Members','♙'],['raid','RAID','⚑'],['reports','Reports','▧'],['ai','AI Prediction','✦']]},
    {title:'Setup & Guide',icon:'⚙',note:'Configuration and learning',items:[['masters','Masters','⚙'],['help','Help','?'],['appendix','Appendix','ƒ']]}
  ];
  const item=(view,label,icon)=>{const dis=navDisabled(view,p);return `<button type="button" class="navMenuItem ${state.view===view?'active':''} ${dis?'disabled':''}" ${dis?'disabled title="Not applicable for selected project"':`onclick="navTo('${view}');closeNavMenus()"`}><span class="mi">${icon}</span><span class="mt">${label}</span>${state.view===view?'<span>✓</span>':''}</button>`};
  const group=g=>{const active=g.items.some(x=>x[0]===state.view);const current=(g.items.find(x=>x[0]===state.view)||[])[1]||g.note;return `<div class="navGroup ${active?'active':''}" data-nav-group><button type="button" class="navGroupBtn" onclick="toggleNavGroup(event,this)"><span class="groupIcon">${g.icon}</span><span class="groupCopy"><span class="groupTitle">${g.title}</span><span class="groupCurrent">${current}</span></span><span class="caret">⌄</span></button><div class="navMenu"><div class="navMenuNote">${g.note}</div>${g.items.map(x=>item(x[0],x[1],x[2])).join('')}</div></div>`};
  el.innerHTML=groups.map(group).join('');
}

  const [tt,ss]=titles[state.view]||titles.summary;document.getElementById('pageTitle').textContent=tt;document.getElementById('pageSub').textContent=ss;
  const content=document.getElementById('content');
